<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
body{display:flex;background:#f4f6fb;}
.sidebar{width:240px;height:100vh;background:#1e3a8a;color:white;padding:25px;position:fixed;}
.sidebar h2{text-align:center;margin-bottom:35px;}
.sidebar ul{list-style:none;}
.sidebar ul li{padding:13px;margin:8px 0;border-radius:6px;cursor:pointer;transition:0.3s;}
.sidebar ul li i{margin-right:10px;}
.sidebar ul li:hover{background:#3b82f6;}
.main{margin-left:240px;width:100%;padding:30px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
.topbar h1{color:#1e3a8a;}
.profile{background:white;padding:8px 15px;border-radius:30px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px;}
.card{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:center;}
.card i{font-size:30px;color:#3b82f6;}
.card h3{font-size:16px;color:#555;}
.card p{font-size:24px;font-weight:600;color:#1e3a8a;}
.table-box{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);}
table{width:100%;border-collapse:collapse;}
table th{background:#3b82f6;color:white;padding:10px;text-align:left;}
table td{padding:10px;border-bottom:1px solid #eee;}
table tr:hover{background:#f1f5ff;}
</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Admin Panel</h2>
<ul>
<li><i class="fa fa-chart-line"></i> Dashboard</li>
<li><i class="fa fa-user-graduate"></i> Students</li>
<li><i class="fa fa-bus"></i> Buses</li>
<li><i class="fa fa-route"></i> Routes</li>
<li><i class="fa fa-location-dot"></i> GPS Tracking</li>
<li><i class="fa fa-right-from-bracket"></i> Logout</li>
</ul>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h1>Dashboard</h1>
<div class="profile" id="adminNameDisplay">Admin</div>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">
<div>
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>
<i class="fa fa-user-graduate"></i>
</div>
<div class="card">
<div>
<h3>Total Buses</h3>
<p id="totalBuses">0</p>
</div>
<i class="fa fa-bus"></i>
</div>
<div class="card">
<div>
<h3>Total Routes</h3>
<p id="totalRoutes">0</p>
</div>
<i class="fa fa-route"></i>
</div>
<div class="card">
<div>
<h3>Active Drivers</h3>
<p id="totalDrivers">0</p>
</div>
<i class="fa fa-id-card"></i>
</div>
</div>

<!-- TABLE -->
<div class="table-box">
<h2 style="margin-bottom:15px;">Recent Students</h2>
<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Center</th>
<th>Address</th>
<th>Fees</th>
</tr>
<tbody id="studentsTableBody">
<!-- Dynamic rows from script.js -->
</tbody>
</table>
</div>

<script src="script.js"></script>
<script>
// Set admin name from localStorage
const adminNameDisplay = document.getElementById("adminNameDisplay");
const storedAdminName = localStorage.getItem("adminName");
if(storedAdminName) adminNameDisplay.innerText = storedAdminName;

// Optional: fetch total counts (students, buses, routes, drivers)
function fetchTotals(){
    fetch('http://127.0.0.1:5000/get_students')
    .then(res => res.json())
    .then(data => {
        document.getElementById('totalStudents').innerText = data.length || 0;
    })
    .catch(err => console.error(err));

    fetch('http://127.0.0.1:5000/get_buses') // create endpoint in app.py for buses count
    .then(res => res.json())
    .then(data => { document.getElementById('totalBuses').innerText = data.length || 0; })
    .catch(err => console.error(err));

    fetch('http://127.0.0.1:5000/get_routes') // create endpoint in app.py for routes count
    .then(res => res.json())
    .then(data => { document.getElementById('totalRoutes').innerText = data.length || 0; })
    .catch(err => console.error(err));

    fetch('http://127.0.0.1:5000/get_drivers') // create endpoint in app.py for active drivers
    .then(res => res.json())
    .then(data => { document.getElementById('totalDrivers').innerText = data.length || 0; })
    .catch(err => console.error(err));
}

document.addEventListener('DOMContentLoaded', function(){
    if(document.getElementById('studentsTableBody')) loadStudents();
    fetchTotals();
});
</script>

</body>
</html>
