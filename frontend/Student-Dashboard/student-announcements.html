<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Announcements | Shuttle System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    background:#f4f6fb;
}

/* CONTENT */
.content{
    margin-left:240px;
    padding:40px;
    width:100%;
}

.content h1{
    margin-bottom:25px;
    color:#1e3a8a;
    font-size:24px;
}

/* ANNOUNCEMENTS CARDS */
.announcement-card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.announcement-card:hover{
    background:#f0f4ff;
}

.announcement-card h3{
    color:#2563eb;
    margin-bottom:10px;
}

.announcement-card p{
    color:#333;
}

.announcement-card span{
    display:block;
    margin-top:10px;
    font-size:12px;
    color:#888;
}

/* TOAST NOTIFICATION */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#3b82f6;
    color:white;
    padding:15px 20px;
    border-radius:8px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
    display:none;
    z-index:999;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN CONTENT -->
<div class="content">
<h1><i class="fas fa-bullhorn"></i> Announcements</h1>
<div id="announcement-body">
<!-- Dynamic announcements will load here -->
</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ----------------- SIDEBAR -----------------
fetch("student-sidebar.html")
.then(res => res.text())
.then(data=>{
    document.getElementById("sidebar").innerHTML = data;
})
.catch(err => console.error("Sidebar fetch error:", err));

// ----------------- ANNOUNCEMENTS -----------------
let latestAnnouncements = [];

async function loadAnnouncements(){
    try {
        const res = await fetch("http://127.0.0.1:5000/get-announcements");
        const data = await res.json();
        const container = document.getElementById("announcement-body");
        container.innerHTML="";

        data.forEach(a=>{
            container.innerHTML += `
            <div class="announcement-card">
                <h3>${a.title}</h3>
                <p>${a.message}</p>
                <span>${a.date}</span>
            </div>`;
        });

        // ----------------- Show Toast if new announcement -----------------
        if(latestAnnouncements.length > 0){
            let newAnns = data.filter(d=>!latestAnnouncements.some(l=>l.id === d.id));
            if(newAnns.length>0){
                newAnns.forEach(ann=>{
                    showToast(`New Announcement: ${ann.title}`);
                });
            }
        }

        latestAnnouncements = data; // update latest announcements

    } catch(e){
        console.error("Load announcements error:", e);
    }
}

// ----------------- TOAST -----------------
function showToast(msg){
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.display="block";
    setTimeout(()=>{ toast.style.display="none"; }, 4000);
}

// ----------------- AUTO REFRESH -----------------
setInterval(loadAnnouncements, 5000); // fetch every 5 seconds

// Initial load
loadAnnouncements();
</script>
</body>
</html>
