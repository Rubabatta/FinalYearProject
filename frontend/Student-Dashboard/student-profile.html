<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile | Uni Shuttle</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef2f7;
display:flex;
}

.content{
margin-left:240px;
padding:40px;
width:100%;
}

.page-title{
font-size:24px;
font-weight:600;
margin-bottom:20px;
color:#111;
}

.profile-card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
max-width:900px;
}

.profile-header{
display:flex;
align-items:center;
gap:18px;
margin-bottom:25px;
}

.avatar-box{
position:relative;
}

.avatar-box img{
width:95px;
height:95px;
border-radius:50%;
object-fit:cover;
border:3px solid #2563eb;
}

.upload-btn{
position:absolute;
bottom:0;
right:0;
background:#2563eb;
color:white;
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:12px;
}

.profile-info h2{
font-size:22px;
margin-bottom:5px;
}

.profile-info p{
font-size:13px;
color:#666;
}

.btns{
margin-left:auto;
display:flex;
gap:10px;
}

button{
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.edit-btn{
background:#2563eb;
color:white;
}

.save-btn{
background:#10b981;
color:white;
display:none;
}

.profile-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:10px;
}

.info-box{
background:#f8fafc;
padding:14px;
border-radius:10px;
}

.info-box span{
display:block;
font-size:12px;
color:#777;
margin-bottom:5px;
}

.info-box input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
outline:none;
}

.info-box input:disabled{
background:#f8fafc;
border:none;
color:#111;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div class="content">

<div id="header"></div>

<div class="page-title">
<i class="fas fa-user"></i> Student Profile
</div>

<div class="profile-card">

<div class="profile-header">

<div class="avatar-box">
<img id="profileImg" src="">
<label class="upload-btn">
<input type="file" id="imgUpload" hidden>
<i class="fas fa-camera"></i>
</label>
</div>

<div class="profile-info">
<h2 id="showName">Loading...</h2>
<p id="showEmail">---</p>
</div>

<div class="btns">
<button class="edit-btn" onclick="enableEdit()">Edit</button>
<button class="save-btn" id="saveBtn" onclick="saveProfile()">Save</button>
</div>

</div>

<div class="profile-grid">

<div class="info-box">
<span>Name</span>
<input type="text" id="name" disabled>
</div>

<div class="info-box">
<span>Email</span>
<input type="text" id="email" disabled>
</div>

<div class="info-box">
<span>Phone</span>
<input type="text" id="contact" disabled>
</div>

<div class="info-box">
<span>Center</span>
<input type="text" id="center" disabled>
</div>

<div class="info-box">
<span>Student ID</span>
<input type="text" id="studentID" disabled>
</div>

<div class="info-box">
<span>Password</span>
<input type="text" id="password" disabled>
</div>

</div>
</div>
</div>

<script>
const API = "http://127.0.0.1:5000";
const student_id = localStorage.getItem("student_id");

/* header */
fetch("header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("header").innerHTML=data;
});

/* sidebar */
fetch("student-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar").innerHTML=data;
});

/* load profile */
function loadProfile(){

fetch(`${API}/get_student/${student_id}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("showName").innerText=data.name;
document.getElementById("showEmail").innerText=data.email;

document.getElementById("name").value=data.name;
document.getElementById("email").value=data.email;
document.getElementById("contact").value=data.contact;
document.getElementById("center").value=data.center;
document.getElementById("studentID").value=data.studentID;
document.getElementById("password").value=data.password;

if(data.image){
let img = API + data.image + "?t=" + Date.now();
document.getElementById("profileImg").src=img;

let headerImg=document.getElementById("headerImg");
if(headerImg) headerImg.src=img;
}

});
}

loadProfile();

/* enable edit */
function enableEdit(){

document.querySelectorAll("input").forEach(input=>{
input.disabled=false;
});

document.getElementById("saveBtn").style.display="inline-block";
}

/* save profile */
function saveProfile(){

fetch(`${API}/update_student/${student_id}`,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:document.getElementById("name").value,
email:document.getElementById("email").value,
contact:document.getElementById("contact").value,
center:document.getElementById("center").value,
studentID:document.getElementById("studentID").value,
password:document.getElementById("password").value
})
})
.then(res=>res.json())
.then(data=>{

alert("Profile Updated Successfully");

document.querySelectorAll("input").forEach(input=>{
input.disabled=true;
});

document.getElementById("saveBtn").style.display="none";

loadProfile();

});
}

/* upload image */
document.getElementById("imgUpload").addEventListener("change", async function(e){

const file = e.target.files[0];
if(!file) return;

const formData = new FormData();
formData.append("image", file);
formData.append("student_id", student_id);

let res = await fetch(`${API}/upload_profile_img`,{
method:"POST",
body:formData
});

let data = await res.json();

if(data.success){
loadProfile();
}

});
</script>

</body>
</html>
