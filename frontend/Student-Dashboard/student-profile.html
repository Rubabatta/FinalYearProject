<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile | Uni Shuttle</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef2f7;
display:flex;
}

.content{
margin-left:240px;
padding:40px;
width:100%;
}

.page-title{
font-size:24px;
font-weight:600;
margin-bottom:25px;
color:#111;
}

.profile-card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
max-width:850px;
}

.profile-header{
display:flex;
align-items:center;
gap:18px;
margin-bottom:25px;
}

.avatar-box{
position:relative;
}

.avatar-box img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid #2563eb;
}

.upload-btn{
position:absolute;
bottom:0;
right:0;
background:#2563eb;
color:white;
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
cursor:pointer;
}

.profile-info h2{
font-size:20px;
margin-bottom:3px;
}

.profile-info p{
font-size:13px;
color:#666;
}

.profile-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.info-box{
background:#f8fafc;
padding:14px;
border-radius:10px;
}

.info-box span{
display:block;
font-size:12px;
color:#777;
margin-bottom:4px;
}

.info-box strong{
font-size:14px;
}
</style>

</head>

<body>

<div id="sidebar"></div>

<div class="content">
<div class="main">

    <div id="header"></div>   <!-- ⭐ NEW -->

    <div class="container">
<div class="page-title">
<i class="fas fa-user"></i> Student Profile
</div>

<div class="profile-card">

<div class="profile-header">

<div class="avatar-box">
<img id="profileImg" src="" alt="Profile Image">

<label class="upload-btn">
<input type="file" id="imgUpload" hidden>
<i class="fas fa-camera"></i>
</label>
</div>

<div class="profile-info">
<h2 id="name">Loading...</h2>
<p id="email">---</p>
</div>

</div>

<div class="profile-grid" id="profileData">Loading...</div>

</div>
</div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
});

/* sidebar */
fetch("student-sidebar.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("sidebar").innerHTML = d;
});

/* student id */
const student_id = localStorage.getItem("student_id");

if(!student_id){
document.getElementById("profileData").innerHTML =
"❌ Student not logged in";
throw new Error("No student_id");
}

/* default image (SAFE LOCAL) */
const defaultImg =
"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iOTAiIGhlaWdodD0iOTAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2VlZWVlZSIvPjwvc3ZnPg==";

document.getElementById("profileImg").src = defaultImg;

/* LOAD PROFILE */
function loadProfile(){

fetch(`http://127.0.0.1:5000/get_student/${student_id}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("name").innerText = data.name;
document.getElementById("email").innerText = data.email;

/* IMAGE FIX (NO GLITCH) */
if(data.image && data.image !== "null"){
document.getElementById("profileImg").src =
data.image + "?t=" + Date.now();
}
else{
document.getElementById("profileImg").src = defaultImg;
}

document.getElementById("profileData").innerHTML = `
<div class="info-box"><span>Center</span><strong>${data.center}</strong></div>
<div class="info-box"><span>Student ID</span><strong>${data.studentID}</strong></div>
<div class="info-box"><span>Phone</span><strong>${data.contact}</strong></div>
<div class="info-box"><span>Email</span><strong>${data.email}</strong></div>
`;

});
}

loadProfile();

/* IMAGE UPLOAD */
document.getElementById("imgUpload").addEventListener("change", async function(e){

const file = e.target.files[0];
if(!file) return;

/* instant preview */
document.getElementById("profileImg").src = URL.createObjectURL(file);

const formData = new FormData();
formData.append("image", file);
formData.append("student_id", student_id);

try{

let res = await fetch("http://127.0.0.1:5000/upload_profile_img", {
method: "POST",
body: formData
});

let data = await res.json();

if(data.success){
setTimeout(()=>loadProfile(),500);
} 

}catch(err){
console.log(err);
}

});

</script>

</body>
</html>
