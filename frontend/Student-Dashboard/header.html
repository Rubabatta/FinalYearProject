<div class="header">
    <h2>🚍 Student Dashboard</h2>

    <div class="header-right">
        <i class="fa fa-bell"></i>

        <div class="profile">
            <img id="headerImg" src="https://i.imgur.com/6VBx3io.png">
        </div>
    </div>
</div>

<style>
.header{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,#2563eb,#1e3a8a);
padding:14px 20px;
border-radius:12px;
color:white;
margin-bottom:18px;
}

.profile img{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
}
</style>

<script>

const API = "http://127.0.0.1:5000";

function loadHeaderImage(){

const student_id = localStorage.getItem("student_id");

if(!student_id) return;

fetch(`${API}/get_student/${student_id}`)
.then(res=>res.json())
.then(data=>{

if(data.image){
document.getElementById("headerImg").src =
API + data.image + "?t=" + Date.now();
}

});

}

/* run always */
document.addEventListener("DOMContentLoaded", loadHeaderImage);

/* auto refresh every 2 sec (safe sync) */
setInterval(loadHeaderImage, 2000);

</script>
