<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routes - Shuttle Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;height:100vh;}
.sidebar{width:230px;height:100vh;background:#2563eb;color:white;padding:25px;position:fixed;}
.sidebar h2{text-align:center;margin-bottom:30px;}
.sidebar ul{list-style:none;}
.sidebar ul li{padding:12px;margin:10px 0;border-radius:6px;cursor:pointer;transition:0.3s;}
.sidebar ul li i{margin-right:10px;}
.sidebar ul li:hover{background:#1e40af;}
.main{margin-left:230px;width:100%;padding:20px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.topbar h1{color:#1e3a8a;}
.profile{background:white;padding:8px 15px;border-radius:30px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
.route-list{background:white;padding:20px;border-radius:12px;}
.route-item{margin-bottom:15px;padding:10px;}

@media (max-width: 900px) {
    body {
        flex-direction: column;
        min-height: auto;
    }

    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        padding: 20px;
    }

    .main {
        margin-left: 0;
        padding: 20px;
    }

    .topbar {
        flex-wrap: wrap;
        gap: 12px;
    }

    .profile {
        margin-top: 10px;
    }
}
</style>
</head>
<body>
<div class="sidebar">
<h2>Student</h2>
<ul>
<li><i class="fa fa-home"></i> Dashboard</li>
<li><i class="fa fa-bus"></i> My Bus</li>
<li><i class="fa fa-route"></i> Route</li>
<li><i class="fa fa-location-dot"></i> Track Bus</li>
<li><i class="fa fa-user"></i> Profile</li>
<li id="logoutBtn"><i class="fa fa-right-from-bracket"></i> Logout</li>
</ul>
</div>

<div class="main">
<div id="header"></div>
<div class="topbar">
<h1>Routes</h1>
<div class="profile" id="studentName">Loading...</div>
</div>

<div class="route-list" id="routeList">
<!-- Routes will be listed here -->
</div>
</div>

<script>
function checkAuth(){
    if(!localStorage.getItem("student_id")){
        window.location.replace("../Home-page/login.html");
    }
}
window.addEventListener("pageshow", checkAuth);
checkAuth();

document.getElementById("studentName").innerText = localStorage.getItem("studentName") || "Student";

const API_URL = "https://acceptable-solace-production-06f3.up.railway.app";

// Fetch routes from backend
fetch(`${API_URL}/get_routes`)
.then(res => res.json())
.then(routes => {
    const routeDiv = document.getElementById("routeList");
    routeDiv.innerHTML = ""; // Clear any existing content
    routes.forEach(route => {
        let div = document.createElement("div");
        div.classList.add("route-item");
        div.innerHTML = `<h3>Route ${route.id}: ${route.start_point} → ${route.end_point}</h3><p>Stops: ${route.stops || 'No stops defined'}</p>`;
        routeDiv.appendChild(div);
    });
})
.catch(err => {
    console.error("Error fetching routes:", err);
    document.getElementById("routeList").innerHTML = "<p>Error loading routes.</p>";
});

// Logout
document.getElementById("logoutBtn").addEventListener("click",function(){
    localStorage.clear();
    window.location.replace("../Home-page/home.html");
});

fetch("header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
    refreshHeaderImage();
});

function refreshHeaderImage(){
    const studentId = localStorage.getItem("student_id");
    if(!studentId) return;

    fetch(`${API_URL}/get_student/${studentId}`)
    .then(res => res.json())
    .then(data => {
        const headerImg = document.getElementById("headerImg");
        if(headerImg){
            const defaultImg = "https://i.imgur.com/6VBx3io.png";
            const imgSrc = (data.image && data.image.trim() !== "") ? (API_URL + data.image + "?t=" + Date.now()) : defaultImg;
            headerImg.src = imgSrc;
        }
    })
    .catch(() => {});
}
</script>
</body>
</html>
