<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Bus</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
}

#sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:240px;
background:#fff;
}

.main{
margin-left:240px;
padding:30px;
}

.header h1{
color:#1e3a8a;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card i{
color:#2563eb;
font-size:22px;
margin-bottom:10px;
}

.card p{
font-size:18px;
font-weight:600;
color:#1e3a8a;
}

#map{
height:400px;
width:100%;
border-radius:12px;
}
</style>

</head>

<body>

<div id="sidebar"></div>

<div class="main">

<div class="header">
<h1>Track Shuttle</h1>
</div>

<div class="cards">

<div class="card">
<i class="fas fa-bus"></i>
<h3>Bus Number</h3>
<p id="busNo">Loading...</p>
</div>

<div class="card">
<i class="fas fa-map-marker-alt"></i>
<h3>Current Location</h3>
<p id="location">Waiting...</p>
</div>

<div class="card">
<i class="fas fa-clock"></i>
<h3>Last Update</h3>
<p id="time">---</p>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// =======================
// CHANGE ONLY THIS URL 👇
// =======================
const API_URL = "https://acceptable-solace-production-06f3.up.railway.app/";

// sidebar load
fetch("student-sidebar.html")
.then(r => r.text())
.then(d => {
document.getElementById("sidebar").innerHTML = d;
})
.catch(err => console.log("Sidebar error:", err));

// MAP INIT
let map = L.map('map').setView([30.1575, 71.5249], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map);

// marker
let marker = L.marker([30.1575, 71.5249]).addTo(map);

// =======================
// LIVE LOCATION FUNCTION
// =======================
function loadLocation() {

fetch(`${API_URL}/get_location/2`)
.then(res => res.json())
.then(data => {

console.log("API DATA:", data);

// no data
if (!data || data.message) {
document.getElementById("location").innerText = "No location";
return;
}

let lat = parseFloat(data.latitude);
let lng = parseFloat(data.longitude);

if (isNaN(lat) || isNaN(lng)) {
console.log("Invalid coordinates");
return;
}

// UI update
document.getElementById("busNo").innerText = data.bus_id;
document.getElementById("location").innerText = lat + ", " + lng;
document.getElementById("time").innerText = data.last_updated || "Now";

// map update
marker.setLatLng([lat, lng]);
map.setView([lat, lng], 16);

})
.catch(err => {
console.log("API ERROR:", err);
document.getElementById("location").innerText = "API Error";
});

}

// AUTO START
loadLocation();
setInterval(loadLocation, 5000);

</script>

</body>
</html>
