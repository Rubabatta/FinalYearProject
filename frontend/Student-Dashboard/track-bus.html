<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Bus</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body{
font-family:Poppins;
background:#f4f6fb;
margin:0;
}

.main{
padding:20px;
margin-left:240px;
}

#map{
height:400px;
border-radius:12px;
margin-top:20px;
}

.card{
background:#fff;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="main">

<h2>🚍 Live Bus Tracking</h2>

<!-- BUS INPUT -->
<input type="number" id="busIdInput" placeholder="Enter Bus ID"
style="padding:10px;width:200px;margin-bottom:10px;">

<button onclick="startTracking()">Track</button>

<div class="card">
Bus: <span id="busNo">-</span><br>
Location: <span id="location">Waiting...</span><br>
Time: <span id="time">-</span>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_URL = "https://acceptable-solace-production-06f3.up.railway.app/";

let map = L.map('map').setView([30.1575, 71.5249], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map);

// default marker
let marker = L.marker([30.1575, 71.5249]).addTo(map);

let busId = null;
let interval = null;

// -----------------------------
// START TRACKING
// -----------------------------
function startTracking(){

busId = document.getElementById("busIdInput").value;

if(!busId){
alert("Enter Bus ID");
return;
}

// stop old interval
if(interval) clearInterval(interval);

// first call
loadLocation();

// repeat every 5 sec
interval = setInterval(loadLocation, 5000);
}

// -----------------------------
// LOAD LOCATION
// -----------------------------
function loadLocation(){

fetch(`${API_URL}/get_location/${busId}`)
.then(res => res.json())
.then(data => {

if(!data || data.message){
document.getElementById("location").innerText = "No data";
return;
}

let lat = parseFloat(data.latitude);
let lng = parseFloat(data.longitude);

// UI update
document.getElementById("busNo").innerText = data.bus_id;
document.getElementById("location").innerText = lat + ", " + lng;
document.getElementById("time").innerText = data.last_updated;

// -----------------------------
// SMOOTH MARKER MOVEMENT
// -----------------------------
marker.setLatLng([lat, lng]).update();

// smooth map follow (not jumpy)
map.panTo([lat, lng], {
animate: true,
duration: 1
});

})
.catch(err => {
console.log(err);
document.getElementById("location").innerText = "Server Error";
});

}

</script>

</body>
</html>
