<script>

const API_URL = "https://acceptable-solace-production-06f3.up.railway.app";

// ==========================
// MAP
// ==========================
let map = L.map('map').setView([30.1575,71.5249], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let marker = L.marker([30.1575,71.5249]).addTo(map);

// ==========================
// HEADER
// ==========================
fetch("header.html")
.then(res => res.text())
.then(data => {
document.getElementById("header").innerHTML = data;
});

// ==========================
// SIDEBAR
// ==========================
fetch("student-sidebar.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("sidebar").innerHTML = data;
});

// ==========================
// ANNOUNCEMENTS
// ==========================
fetch(`${API_URL}/get-announcements`)
.then(res => res.json())
.then(data => {

  if(data.length > 0){

    const latest = data[0];

    document.getElementById("announcement").textContent =
      latest.title + ": " + latest.message;

  }else{

    document.getElementById("announcement").textContent =
      "No announcements";

  }

})
.catch(()=>{

  document.getElementById("announcement").textContent =
    "No announcements";

});

// ==========================
// GLOBALS
// ==========================
let selectedBusId = null;
let routeStops = [];
let intervalId = null;
let busesData = [];

// ==========================
// LOAD BUSES
// ==========================
fetch(`${API_URL}/get_buses`)
.then(res=>res.json())
.then(buses=>{

  busesData = buses;

  const busSelect = document.getElementById("busSelect");

  buses.forEach(bus=>{

    let option = document.createElement("option");

    option.value = bus.id;

    option.textContent =
      bus.bus_number || `Bus ${bus.id}`;

    busSelect.appendChild(option);

  });

  busSelect.addEventListener("change", function(){

    selectBus(this.value);

  });

})
.catch(err=>{

  console.log("BUS LOAD ERROR:", err);

});

// ==========================
// SELECT BUS
// ==========================
function selectBus(busId){

  if(intervalId){

    clearInterval(intervalId);
    intervalId = null;

  }

  selectedBusId = busId;

  let bus = busesData.find(
    b => String(b.id) === String(busId)
  );

  if(!bus){

    document.getElementById("route").textContent = "--";
    document.getElementById("busName").textContent = "--";
    document.getElementById("currentStop").textContent = "--";
    document.getElementById("nextStop").textContent = "--";

    return;

  }

  // ==========================
  // BUS NAME
  // ==========================
  document.getElementById("busName").textContent =
    bus.bus_number || "--";

  // ==========================
  // ROUTE
  // ==========================
  document.getElementById("route").textContent =
    `${bus.start_point || "--"} → ${bus.end_point || "--"}`;

  // ==========================
  // LOAD STOPS
  // ==========================
  routeStops = [];

  if(bus.route_id){

    fetch(`${API_URL}/get_stops/${bus.route_id}`)

    .then(res=>res.json())

    .then(stops=>{

      routeStops = stops;

      updateLocation();

      intervalId = setInterval(updateLocation, 3000);

    })

    .catch(err=>{

      console.log("STOP ERROR:", err);

      updateLocation();

      intervalId = setInterval(updateLocation, 3000);

    });

  }else{

    updateLocation();

    intervalId = setInterval(updateLocation, 3000);

  }

}

// ==========================
// UPDATE LOCATION
// ==========================
function updateLocation(){

  if(!selectedBusId) return;

  fetch(`${API_URL}/get_location/${selectedBusId}`)

  .then(res=>res.json())

  .then(data=>{

    console.log("LIVE LOCATION:", data);

    // ==========================
    // OFFLINE
    // ==========================
    if(data.message){

      document.getElementById("currentStop").textContent =
        "Bus Offline";

      document.getElementById("nextStop").textContent =
        "--";

      return;

    }

    let lat = parseFloat(data.latitude);
    let lng = parseFloat(data.longitude);

    if(isNaN(lat) || isNaN(lng)){

      document.getElementById("currentStop").textContent =
        "No location";

      document.getElementById("nextStop").textContent =
        "--";

      return;

    }

    // ==========================
    // UPDATE MARKER
    // ==========================
    marker.setLatLng([lat, lng]);

    map.setView([lat, lng], 15);

    // ==========================
    // FIND CURRENT STOP
    // ==========================
    if(routeStops.length > 0){

      let nearestIndex = 0;
      let nearestDistance = Infinity;

      routeStops.forEach((stop,index)=>{

        let stopLat = parseFloat(stop.latitude);
        let stopLng = parseFloat(stop.longitude);

        if(isNaN(stopLat) || isNaN(stopLng)) return;

        let distance =
          Math.pow(lat - stopLat, 2) +
          Math.pow(lng - stopLng, 2);

        if(distance < nearestDistance){

          nearestDistance = distance;
          nearestIndex = index;

        }

      });

      let currentStop = routeStops[nearestIndex];
      let nextStop = routeStops[nearestIndex + 1];

      document.getElementById("currentStop").textContent =
        currentStop?.stop_name || "--";

      document.getElementById("nextStop").textContent =
        nextStop?.stop_name || "Route End";

    }
    else{

      document.getElementById("currentStop").textContent =
        "No Stops";

      document.getElementById("nextStop").textContent =
        "--";

    }

  })

  .catch(err=>{

    console.log("LOCATION ERROR:", err);

    document.getElementById("currentStop").textContent =
      "Bus Offline";

    document.getElementById("nextStop").textContent =
      "--";

  });

}

</script>
