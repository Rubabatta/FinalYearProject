<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shuttle Routes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#eef2ff,#f8fafc);
display:flex;
}

/* SIDEBAR FIX */
#sidebar{
width:240px;
position:fixed;
left:0;
top:0;
height:100vh;
background:#2563eb;
z-index:1000;
}

/* MAIN */
.main{
margin-left:240px;
padding:45px;
width:100%;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:35px;
}

.header i{
color:#2563eb;
font-size:22px;
}

.header h1{
font-size:28px;
font-weight:700;
color:#0f172a;
}

/* ROUTES */
.routes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
gap:22px;
}

/* CARD */
.route-card{
background:#fff;
padding:24px;
border-radius:18px;
border:1px solid #eef2ff;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
transition:0.3s;
}

.route-card:hover{
transform:translateY(-6px);
box-shadow:0 18px 35px rgba(0,0,0,0.12);
}

.icon{
display:flex;
align-items:center;
gap:10px;
color:#2563eb;
font-weight:600;
font-size:14px;
margin-bottom:10px;
}

.route-card h3{
font-size:15px;
color:#1e293b;
margin-bottom:10px;
}

/* BUTTON */
.view-stops-btn{
padding:9px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:13px;
font-weight:600;
color:white;
background:linear-gradient(135deg,#2563eb,#1e40af);
transition:0.25s;
}

.view-stops-btn:hover{
transform:scale(1.05);
}

/* POPUP */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(15,23,42,0.55);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup{
background:white;
width:360px;
max-width:90%;
border-radius:18px;
padding:22px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.popup-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.popup-header h2{
font-size:18px;
color:#1e293b;
}

.close-btn{
border:none;
background:#ef4444;
color:white;
width:32px;
height:32px;
border-radius:8px;
cursor:pointer;
}

.stop-item{
padding:10px;
border-radius:10px;
background:#f1f5f9;
margin-bottom:8px;
font-size:13px;
}

.stop-item:hover{
background:#e2e8f0;
}

/* RESPONSIVE */
@media(max-width:900px){
.main{
margin-left:0;
padding:20px;
}

#sidebar{
position:relative;
width:100%;
height:auto;
}
}
</style>
</head>

<body>

<!-- SIDEBAR FIXED -->
<div id="sidebar"></div>

<div class="main">

<div class="header">
<i class="fa-solid fa-route"></i>
<h1>Shuttle Routes</h1>
</div>

<div class="routes" id="routesContainer"></div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay">
<div class="popup">

<div class="popup-header">
<h2>Route Stops</h2>
<button class="close-btn" onclick="closePopup()">
<i class="fa fa-xmark"></i>
</button>
</div>

<div id="stopList"></div>

</div>
</div>

<script>

const API_URL = "https://acceptable-solace-production-06f3.up.railway.app";

/* ✅ SIDEBAR FIX (IMPORTANT) */
fetch("student-sidebar.html")
.then(res => res.text())
.then(data => {
document.getElementById("sidebar").innerHTML = data;
});

/* LOAD ROUTES */
function loadRoutes(){
fetch(`${API_URL}/get_routes`)
.then(res => res.json())
.then(data => {

const container = document.getElementById("routesContainer");
container.innerHTML = "";

data.forEach(route => {

const card = document.createElement("div");
card.className = "route-card";

card.innerHTML = `
<div class="icon"><i class="fa-solid fa-bus"></i> Route #${route.id}</div>
<h3>${route.start_point} → ${route.end_point}</h3>

<button class="view-stops-btn" onclick="openStops(${route.id})">
View Stops
</button>
`;

container.appendChild(card);
});
});
}

/* POPUP */
function openStops(routeId){

fetch(`${API_URL}/get_stops/${routeId}`)
.then(res => res.json())
.then(data => {

let html = "";

if(data.length === 0){
html = `<div class="stop-item">No stops found</div>`;
}
else{
data.forEach(stop => {
html += `<div class="stop-item">${stop.stop_name}</div>`;
});
}

document.getElementById("stopList").innerHTML = html;
document.getElementById("overlay").style.display = "flex";

});
}

function closePopup(){
document.getElementById("overlay").style.display = "none";
}

document.addEventListener("DOMContentLoaded", loadRoutes);

</script>

</body>
</html>
