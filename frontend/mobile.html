<!DOCTYPE html>
<html>
<head>
<title>Live Location Sender</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:50px;">

<h2>📍 Live Location Tracker</h2>

<button onclick="startTracking()" style="padding:10px 20px;font-size:16px;">
Start Sharing Location
</button>

<p id="status">Status: Not started</p>

<script>

let tracking = false;

function startTracking() {

  if (tracking) return; // prevent multiple clicks

  tracking = true;

  document.getElementById("status").innerText =
    "Status: Tracking started...";

  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  setInterval(() => {

    navigator.geolocation.getCurrentPosition(
      (pos) => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        document.getElementById("status").innerText =
          "Sending: " + lat + ", " + lng;

        fetch("https://frightful-skies-untrimmed.ngrok-free.dev/update_location", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            lat: lat,
            lng: lng
          })
        });

      },

      (err) => {
        document.getElementById("status").innerText =
          "❌ GPS Permission Error";
        console.log(err);
      }

    );

  }, 3000);

}

</script>

</body>
</html>
