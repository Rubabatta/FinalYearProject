<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Student Login - Shuttle Tracker</title>

<link rel="stylesheet" href="student-login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="logo">

<i class="fa-solid fa-bus"></i>
<h2>University Shuttle Tracker</h2>

</div>

<h3>Student Login</h3>

<form action="dashboard.html">

<div class="input-box">

<i class="fa fa-user"></i>
<input type="text" placeholder="Student ID or Email" required>

</div>

<div class="input-box">

<i class="fa fa-lock"></i>
<input type="password" placeholder="Password" required>

</div>

<button class="login-btn">Login</button>

</form>

<p class="footer-text">

University Transport System

</p>

</div>

</div>
<script>
    const loginForm = document.querySelector('form');

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = loginForm.querySelector('input[placeholder="Student ID or Email"]').value;
    const password = loginForm.querySelector('input[placeholder="Password"]').value;

    const res = await fetch('http://127.0.0.1:5000/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username, password})
    });

    const data = await res.json();

    if(data.status === "success"){
        alert(`Login Success! Role: ${data.role}`);
        window.location.href = 'index.html'; // dashboard page
    } else {
        alert("Invalid Username or Password!");
    }
});
</script>
</body>
</html>
