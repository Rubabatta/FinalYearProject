<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login | Uni Shuttle</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: url("images/uni-bus2.jpeg") no-repeat center center/cover;
}

/* LOGIN CARD */
.login-card{
    background: rgba(255,255,255,0.2); /* transparent */
    backdrop-filter: blur(4px); /* subtle blur */
    padding:50px 40px;
    width:380px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    text-align:center;
}

/* LOGO */
.logo img{
    width:100px;
    margin-bottom:15px;
}

/* TITLE */
.login-card h2{
    color:white;
    margin-bottom:25px;
    font-size:26px;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
}

/* INPUT GROUP */
.input-group{
    position:relative;
    margin:15px 0;
}

.input-group input{
    width:100%;
    padding:12px 40px;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:14px;
}

.input-group i{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:#888;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e40af;
}

/* MESSAGE */
#message{
    margin-top:15px;
    font-size:14px;
    font-weight:500;
    color:white;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

/* REGISTER */
.register{
    margin-top:18px;
    font-size:14px;
    color:white;
}

.register a{
    text-decoration:none;
    color:#3b82f6;
    font-weight:500;
}

/* RESPONSIVE */
@media(max-width:500px){
    .login-card{
        width:90%;
        padding:30px;
    }
}
</style>
</head>
<body>

<div class="login-card">

<div class="logo">
<img src="images/BUS-removebg-preview (1).png" alt="logo">
</div>

<h2>Student Login</h2>

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" id="username" placeholder="Student Username">
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password">
</div>

<button id="loginBtn">Login</button>

<p id="message"></p>

<div class="register">
Don't have an account? <a href="student_signup.html">Register</a>
</div>

</div>

<script>
document.getElementById("loginBtn").addEventListener("click", function(){
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    if(username === "student" && password === "123"){
        message.style.color = "green";
        message.innerText = "✅ Login Successful";
        setTimeout(() => {
            window.location.href = "studen-dashborad.html";
        }, 500);
    } else {
        message.style.color = "red";
        message.innerText = "❌ Invalid Username or Password";
    }
});
</script>

</body>
</html>
