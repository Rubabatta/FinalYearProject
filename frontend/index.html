<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Shuttle Location — Student View</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; }
        #map { height: 100vh; width: 100%; }
        h2 { text-align:center; margin-top:10px; }
    </style>
    <!-- Replace YOUR_GOOGLE_MAPS_API_KEY with your actual API key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBzeGejJvMG7HwnoMVTq9jaRMyGNzqeW0"></script>
</head>
<body>
    <h2>Live Shuttle Location</h2>
    <div id="map"></div>

    <script>
        let map;
        let marker;

        function initMap() {
            const defaultLoc = { lat: 24.8607, lng: 67.0011 }; // Karachi default
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: defaultLoc,
            });

            marker = new google.maps.Marker({
                position: defaultLoc,
                map: map,
                title: "Shuttle Location"
            });

            // Update every 5 seconds
            setInterval(fetchLocation, 5000);
        }

        async function fetchLocation() {
            try {
                let res = await fetch('http://127.0.0.1:5000/get_location');
                let data = await res.json();

                if(data.latitude && data.longitude){
                    const newPos = { lat: data.latitude, lng: data.longitude };
                    marker.setPosition(newPos);
                    map.setCenter(newPos);
                }
            } catch(err) {
                console.error("Error fetching location:", err);
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
