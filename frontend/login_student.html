<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login — Shuttle Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#0f172a; color:white; margin:0; }
        .login-box { background:#1e293b; padding:30px; border-radius:10px; text-align:center; }
        input { display:block; margin:10px auto; padding:10px; width:220px; border-radius:5px; border:none; }
        button { padding:10px 20px; background:#22c55e; border:none; color:white; cursor:pointer; border-radius:5px; }
        #msg { margin-top:10px; }
        #map { height: 500px; width: 90%; margin-top:20px; display:none; }
    </style>
    <!-- Replace YOUR_GOOGLE_MAPS_API_KEY with your valid key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBzeGejJvMG7HwnoMVTq9jaRMyGNzqeW0"></script>
</head>
<body>
    <div class="login-box" id="login-box">
        <h2>Student Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="msg"></p>
    </div>

    <div id="map"></div>

    <script>
        let map, marker;

        async function login() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let msg = document.getElementById("msg");

            try {
                let response = await fetch("http://127.0.0.1:5000/login", {
                    method:"POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                let data = await response.json();

                if(data.status === "success"){
                    msg.innerText = `✅ Login Success (${data.role})`;
                    msg.style.color = "#22c55e";
                    document.getElementById("login-box").style.display = "none";
                    document.getElementById("map").style.display = "block";
                    initMap();
                } else {
                    msg.innerText = "⚠️ Invalid Login!";
                    msg.style.color = "red";
                }
            } catch(err) {
                console.error(err);
                msg.innerText = "⚠️ Server Error!";
                msg.style.color = "orange";
            }
        }

        function initMap() {
            const defaultLoc = { lat: 24.8607, lng: 67.0011 }; // Karachi
            map = new google.maps.Map(document.getElementById("map"), { zoom: 12, center: defaultLoc });
            marker = new google.maps.Marker({ position: defaultLoc, map: map, title: "Shuttle Location" });
            setInterval(fetchLocation, 5000);
        }

        async function fetchLocation() {
            try {
                let res = await fetch('http://127.0.0.1:5000/get_location');
                let data = await res.json();
                if(data.latitude && data.longitude){
                    const newPos = { lat: data.latitude, lng: data.longitude };
                    marker.setPosition(newPos);
                    map.setCenter(newPos);
                }
            } catch(err) {
                console.error("Error fetching location:", err);
            }
        }
    </script>
</body>
</html>
