<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Uni Shuttle</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background: url("../images/uni-bus2.jpeg") no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menu-icon{
    position:absolute;
    top:30px;
    right:30px;
    font-size:28px;
    color:white;
    cursor:pointer;
}

.container{
    text-align:center;
    padding:30px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(2px);
    border-radius:20px;
    width:320px;
}

h1{
    color:white;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

#message{
    margin-top:10px;
    color:white;
}
</style>
</head>

<body>

<div class="menu-icon" onclick="goHome()">
<i class="fa fa-bars"></i>
</div>

<div class="container">

<h1>Login</h1>

<input type="text" id="identifier" placeholder="Email / Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="message"></p>

</div>

<script>

function login(){

const identifier = document.getElementById("identifier").value.trim();
const password = document.getElementById("password").value.trim();
const message = document.getElementById("message");

if(identifier === "" || password === ""){
message.style.color="red";
message.innerText="❌ Please fill all fields";
return;
}

// ================= STUDENT LOGIN =================
fetch('http://127.0.0.1:5000/student_login', {
method: 'POST',
headers: {'Content-Type':'application/json'},
body: JSON.stringify({
email: identifier,
password: password
})
})
.then(res => res.json())
.then(data => {

if(data.student){

message.style.color="lightgreen";
message.innerText="✅ Student Login Successful";

// ⭐⭐⭐ IMPORTANT FIX (THIS WAS MISSING)
localStorage.setItem("student_id", data.student.id);
localStorage.setItem("studentName", data.student.name);
localStorage.setItem("studentEmail", data.student.email);

setTimeout(()=>{
window.location.href="../Student-Dashboard/student-dashborad.html";
},500);

} 
else {

// ================= ADMIN LOGIN =================
fetch('http://127.0.0.1:5000/admin_login', {
method: 'POST',
headers: {'Content-Type':'application/json'},
body: JSON.stringify({
username: identifier,
password: password
})
})
.then(res => res.json())
.then(data => {

if(data.admin){

message.style.color="lightgreen";
message.innerText="✅ Admin Login Successful";

localStorage.setItem("adminName", data.admin.username);

setTimeout(()=>{
window.location.href="../Admin-Dashboard/admin.html";
},500);

} else {
message.style.color="red";
message.innerText="❌ Invalid credentials";
}

});

}

});

}

function goHome(){
window.location.href="index.html";
}

</script>

</body>
</html>
