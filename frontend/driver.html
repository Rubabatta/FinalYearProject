<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Panel — Shuttle Tracker</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0f172a;
margin:0;
color:white;
}

.driver-box{
background:#1e293b;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#msg{
margin-top:20px;
padding:10px;
border-radius:6px;
display:none;
font-weight:bold;
}

.success{
background:#16a34a;
}

.error{
background:#ef4444;
}

.warning{
background:#f59e0b;
}

</style>
</head>

<body>

<div class="driver-box">

<h2>Driver Panel</h2>
<p>Send Shuttle Location</p>

<button onclick="sendLocation()">Send My Location</button>

<div id="msg"></div>

</div>


<script>

function showMessage(text,type){

let msg=document.getElementById("msg");

msg.innerText=text;

msg.className="";
msg.classList.add(type);

msg.style.display="block";

}

async function sendLocation(){

if(!navigator.geolocation){
showMessage("⚠️ Geolocation not supported","warning");
return;
}

navigator.geolocation.getCurrentPosition(async function(position){

let data={
latitude:position.coords.latitude,
longitude:position.coords.longitude
};

try{

let response=await fetch("http://127.0.0.1:5000/update_location",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

let result=await response.json();

if(result.status==="Location Updated"){
showMessage("✅ Location Updated Successfully","success");
}else{
showMessage("⚠️ Something went wrong","error");
}

}catch(err){

console.log(err);
showMessage("⚠️ Server Error","error");

}

},
function(){

showMessage("⚠️ Unable to get location","warning");

});

}

</script>

</body>
</html>
