<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
}

.card h2{
color:#1e3a8a;
margin-bottom:20px;
}

.info{
text-align:left;
margin-top:10px;
}

.info p{
margin:10px 0;
font-size:14px;
color:#333;
}

.label{
font-weight:600;
color:#2563eb;
}
</style>
</head>

<body>

<div class="card">
<h2>Admin Profile</h2>

<div class="info">
<p><span class="label">Name:</span> System Admin</p>
<p><span class="label">Email:</span> admin@gmail.com</p>
<p><span class="label">Phone:</span> 0300-0000000</p>
<p><span class="label">Role:</span> Administrator</p>
<p><span class="label">Status:</span> Active</p>
</div>

</div>

</body>
</html>
