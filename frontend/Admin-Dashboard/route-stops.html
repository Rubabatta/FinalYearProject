<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Route Stops</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#f4f6fb;
}

.main{
margin-left:240px;
width:100%;
padding:30px;
}

h1{color:#1e3a8a;margin-bottom:20px;}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#3b82f6;
color:white;
}

button:hover{background:#1e40af;}

.table-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

table{width:100%;border-collapse:collapse;}

table th{
background:#3b82f6;
color:white;
padding:12px;
text-align:left;
}

table td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

.delete-btn{background:#ef4444;}
.delete-btn:hover{background:#dc2626;}

.icon-btn{
background:none;
border:none;
cursor:pointer;
font-size:16px;
margin-right:8px;
}

.icon-btn.edit{color:#f59e0b;}

input{
padding:10px;
border:1px solid #d1d5db;
border-radius:8px;
width:220px;
}

.add-box{
margin-bottom:20px;
display:flex;
gap:10px;
align-items:center;
background:white;
padding:20px;
border-radius:12px;
}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>

<div class="main">

<h1>Manage Stops for Route</h1>

<div class="add-box">

<input type="text" id="stopName" placeholder="Enter Stop Name">
<input type="text" id="latitude" placeholder="Latitude">
<input type="text" id="longitude" placeholder="Longitude">

<button onclick="addStop()">Add Stop</button>

</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>ID</th>
<th>Stop Name</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Action</th>
</tr>
</thead>

<tbody id="stopsTable"></tbody>
</table>
</div>

</div>

<script>

const API = "https://acceptable-solace-production-06f3.up.railway.app"; 
// ✅ ONLY Railway backend

const routeId = new URLSearchParams(window.location.search).get("route_id");

// SIDEBAR
fetch('sidebar.html')
.then(res => res.text())
.then(html => {
document.getElementById('sidebar-placeholder').innerHTML = html;
});

// =====================
// LOAD STOPS (FIXED)
// =====================
function loadStops(){

fetch(`${API}/get_stops/${routeId}`)
.then(res => res.json())
.then(data => {

const table = document.getElementById("stopsTable");
table.innerHTML = "";

let count = 1;

data.forEach(stop => {

table.innerHTML += `
<tr>
<td>${count++}</td>
<td>${stop.stop_name}</td>
<td>${stop.latitude ?? "-"}</td>
<td>${stop.longitude ?? "-"}</td>
<td>

<button class="icon-btn edit"
onclick="editStop(${stop.id},'${stop.stop_name}','${stop.latitude}','${stop.longitude}')">
<i class="fa fa-pen"></i>
</button>

<button class="delete-btn" onclick="deleteStop(${stop.id})">
<i class="fa fa-trash"></i>
</button>

</td>
</tr>
`;
});

});
}

// =====================
// ADD STOP
// =====================
function addStop(){

fetch(`${API}/add_stop`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
route_id:routeId,
stop_name:document.getElementById("stopName").value,
latitude:document.getElementById("latitude").value,
longitude:document.getElementById("longitude").value
})
})
.then(res=>res.json())
.then(()=>{
loadStops();
document.getElementById("stopName").value="";
document.getElementById("latitude").value="";
document.getElementById("longitude").value="";
});
}

// =====================
// EDIT STOP (FIXED)
// =====================
function editStop(id,name,lat,lng){

let newName = prompt("Stop Name", name);
if(!newName) return;

let newLat = prompt("Latitude", lat);
let newLng = prompt("Longitude", lng);

fetch(`${API}/update_stop/${id}`,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
stop_name:newName,
latitude:newLat,
longitude:newLng
})
})
.then(res=>res.json())
.then(()=>{
loadStops();
});
}

// =====================
// DELETE
// =====================
function deleteStop(id){

fetch(`${API}/delete_stop/${id}`,{
method:"DELETE"
})
.then(()=>loadStops());
}

document.addEventListener("DOMContentLoaded",loadStops);

</script>

</body>
</html>
