<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Route Stops</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}
.main{margin-left:240px;width:100%;padding:30px;}
h1{color:#1e3a8a;margin-bottom:20px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
button{padding:8px 15px;border:none;border-radius:6px;cursor:pointer;background:#3b82f6;color:white;margin-right:10px;}
button:hover{background:#1e40af;}
.table-box{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);}
table{width:100%;border-collapse:collapse;}
table th{background:#3b82f6;color:white;padding:10px;text-align:left;}
table td{padding:10px;border-bottom:1px solid #eee;}
.delete-btn{background:#ef4444;}
.delete-btn:hover{background:#dc2626;}
.icon-btn{
  background:none;
  border:none;
  cursor:pointer;
  font-size:16px;
  margin-right:8px;
}
.icon-btn.edit{color:#f59e0b;}
.icon-btn.edit:hover{color:#b45309;}
input{padding:8px;border:1px solid #ccc;border-radius:6px;margin-right:10px;}
.add-box{margin-bottom:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
</style>
</head>
<body>

<!-- Sidebar placeholder -->
<div id="sidebar-placeholder"></div>

<!-- Main content -->
<div class="main">
<h1>Manage Stops for Route</h1>

<div class="add-box">
<input type="text" id="stopName" placeholder="Enter Stop Name">
<button onclick="addStop()">Add Stop</button>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>ID</th>
<th>Stop Name</th>
<th>Action</th>
</tr>
</thead>
<tbody id="stopsTable"></tbody>
</table>
</div>
</div>

<script>
// Load sidebar
fetch('sidebar.html')
.then(res => res.text())
.then(html => {
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

// Get route ID from URL
const urlParams = new URLSearchParams(window.location.search);
const routeId = urlParams.get("route_id");

if(!routeId){
    alert("No route selected!");
    window.location.href = "routes.html";
}

// Load stops for this route
function loadStops(){
    fetch(`http://127.0.0.1:5000/get_stops/${routeId}`)
    .then(res => res.json())
    .then(data => {
        const table = document.getElementById("stopsTable");
        table.innerHTML = "";
        let count = 1;
        data.forEach(stop => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${count++}</td>
                <td>${stop.stop_name}</td>
                <td>
                    <button class="icon-btn edit" onclick="editStop(${stop.id}, '${stop.stop_name}')">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                    <button class="delete-btn" onclick="deleteStop(${stop.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            `;
            table.appendChild(row);
        });
    });
}

// Add stop
function addStop(){
    const stopName = document.getElementById("stopName").value.trim();
    if(stopName === ""){
        alert("Enter stop name");
        return;
    }
    fetch("http://127.0.0.1:5000/add_stop", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({route_id: routeId, stop_name: stopName})
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        document.getElementById("stopName").value = "";
        loadStops();
    })
    .catch(err => console.error(err));
}

// Edit stop
function editStop(id, oldName){
    const newName = prompt("Enter new stop name:", oldName);
    if(newName && newName.trim() !== ""){
        fetch(`http://127.0.0.1:5000/update_stop/${id}`,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({stop_name:newName.trim()})
        })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            loadStops();
        })
        .catch(err => {
            console.error(err);
            alert("Error updating stop");
        });
    }
}

// Delete stop
function deleteStop(id){
    if(!confirm("Are you sure you want to delete this stop?")) return;
    fetch(`http://127.0.0.1:5000/delete_stop/${id}`, {method:"DELETE"})
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadStops();
    })
    .catch(err => console.error(err));
}

// Load stops on page load
document.addEventListener("DOMContentLoaded", loadStops);
</script>

</body>
</html>
