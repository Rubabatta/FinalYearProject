<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Bus</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    background:
    radial-gradient(circle at top left,#dbeafe,#eef2ff 40%),
    radial-gradient(circle at bottom right,#bfdbfe,#eef2ff 45%);
    min-height:100vh;
    overflow-x:hidden;
}
#sidebar-placeholder{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:100;}
.main{margin-left:240px;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.add-card{width:100%;max-width:390px;padding:22px;border-radius:24px;background:rgba(255,255,255,0.95);backdrop-filter:blur(14px);box-shadow:0 18px 40px rgba(37,99,235,0.10),0 6px 16px rgba(15,23,42,0.08);}
.form-top{text-align:center;margin-bottom:18px;}
.form-icon{width:56px;height:56px;border-radius:16px;margin:auto;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2563eb,#1e40af);color:white;font-size:22px;margin-bottom:12px;}
.form-top h1{color:#1e3a8a;font-size:22px;margin-bottom:4px;font-weight:700;}
.form-top p{color:#64748b;font-size:12px;}
.input-group{position:relative;margin-bottom:13px;}
.input-group i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:13px;}
.input-group input,
.input-group select{width:100%;padding:12px 14px 12px 40px;border:none;outline:none;border-radius:12px;background:#f8fafc;font-size:13px;color:#0f172a;border:1.5px solid transparent;transition:0.3s;}
.input-group input:focus,
.input-group select:focus{background:white;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,0.10);}
button{width:100%;border:none;padding:13px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:0.3s;}
button:hover{transform:translateY(-2px);}
@media(max-width:768px){#sidebar-placeholder{position:relative;width:100%;height:auto;} .main{margin-left:0;padding:20px;} .add-card{max-width:100%;padding:24px;}}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>

<div class="main">
<div class="add-card">
<div class="form-top">
    <div class="form-icon">
        <i class="fa-solid fa-bus"></i>
    </div>
    <h1>Update Bus</h1>
    <p>Change the assigned route</p>
</div>

<div class="input-group">
<i class="fa fa-hashtag"></i>
<input type="text" id="busNumber" placeholder="Bus Number">
</div>

<div class="input-group">
<i class="fa fa-road"></i>
<select id="routeSelect"></select>
</div>

<button type="button" onclick="updateBus()">Update Bus</button>
<p id="message"></p>
</div>
</div>

<script>
// Load sidebar dynamically
fetch('sidebar.html')
.then(res => res.text())
.then(html => {
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

// Logout function
function logout(){
    localStorage.removeItem("adminName");
    window.location.href="admin-login.html";
}

// Get bus ID from URL
function getBusId(){
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

// Load bus info and routes
async function loadBusData(){
    const busId = getBusId();
    if(!busId) { alert("No bus ID provided"); return; }

    const resBus = await fetch(`https://acceptable-solace-production-06f3.up.railway.app/get_bus/${busId}`);
    const bus = await resBus.json();

    document.getElementById("busNumber").value = bus.bus_number;

    const resRoutes = await fetch('https://acceptable-solace-production-06f3.up.railway.app/get_routes');
    const routes = await resRoutes.json();

    const select = document.getElementById("routeSelect");
    select.innerHTML = `<option value="">Select Route</option>`;

    routes.forEach(route=>{
        const option = document.createElement("option");
        option.value = route.id;
        option.textContent = `${route.start_point} - ${route.end_point}`;
        if(route.id === bus.route_id) option.selected = true;
        select.appendChild(option);
    });
}

// Update bus
function updateBus(){
    const busId = getBusId();
    const bus_number = document.getElementById("busNumber").value.trim();
    const route_id = document.getElementById("routeSelect").value;

    if(bus_number === "" || route_id === ""){
        alert("Please fill all fields");
        return;
    }

    fetch(`https://acceptable-solace-production-06f3.up.railway.app/update_bus/${busId}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({bus_number, route_id})
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        window.location.href="buses.html";
    })
    .catch(err=>{
        console.error(err);
        alert("Server error, check console");
    });
}

// Initial load
document.addEventListener("DOMContentLoaded", loadBusData);
</script>

</body>
</html>
