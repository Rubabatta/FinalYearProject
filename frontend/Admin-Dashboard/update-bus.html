<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Bus</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}
.main{margin-left:240px;padding:40px;width:100%;}
.topbar h1{color:#1e3a8a;margin-bottom:20px;}
.form-box{background:white;padding:30px;border-radius:10px;width:400px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.form-box label{display:block;margin-top:15px;}
.form-box input,
.form-box select{width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:6px;}
button{margin-top:20px;padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;}
button:hover{background:#1e40af;}
</style>
</head>

<body>

<!-- Sidebar placeholder -->
<div id="sidebar-placeholder"></div>

<!-- Main content -->
<div class="main">
<div class="topbar">
<h1>Update Bus</h1>
</div>

<div class="form-box">
<label>Bus Number</label>
<input type="text" id="busNumber" placeholder="Enter Bus Number">

<label>Route</label>
<select id="routeSelect">
<option value="">Select Route</option>
</select>

<button onclick="updateBus()">Update Bus</button>
</div>
</div>

<script>
// Load sidebar dynamically
fetch('sidebar.html')
.then(res => res.text())
.then(html => {
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

// Logout function
function logout(){
    localStorage.removeItem("adminName");
    window.location.href="admin-login.html";
}

// Get bus ID from URL
function getBusId(){
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

// Load bus info and routes
async function loadBusData(){
    const busId = getBusId();
    if(!busId) { alert("No bus ID provided"); return; }

    const resBus = await fetch(`http://127.0.0.1:5000/get_bus/${busId}`);
    const bus = await resBus.json();

    document.getElementById("busNumber").value = bus.bus_number;

    const resRoutes = await fetch('http://127.0.0.1:5000/get_routes');
    const routes = await resRoutes.json();

    const resBuses = await fetch('http://127.0.0.1:5000/get_buses');
    const buses = await resBuses.json();

    const assignedRouteIds = buses
        .filter(b => b.id != bus.id)
        .map(b => b.route_id)
        .filter(id => id != null);

    const select = document.getElementById("routeSelect");
    select.innerHTML = `<option value="">Select Route</option>`;

    routes.forEach(route=>{
        if(!assignedRouteIds.includes(route.id) || route.id === bus.route_id){
            const option = document.createElement("option");
            option.value = route.id;
            option.textContent = `${route.start_point} - ${route.end_point}`;
            if(route.id === bus.route_id) option.selected = true;
            select.appendChild(option);
        }
    });
}

// Update bus
function updateBus(){
    const busId = getBusId();
    const bus_number = document.getElementById("busNumber").value.trim();
    const route_id = document.getElementById("routeSelect").value;

    if(bus_number === "" || route_id === ""){
        alert("Please fill all fields");
        return;
    }

    fetch(`http://127.0.0.1:5000/update_bus/${busId}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({bus_number, route_id})
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        window.location.href="buses.html";
    })
    .catch(err=>{
        console.error(err);
        alert("Server error, check console");
    });
}

// Initial load
document.addEventListener("DOMContentLoaded", loadBusData);
</script>

</body>
</html>
