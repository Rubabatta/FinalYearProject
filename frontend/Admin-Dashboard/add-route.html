<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Route</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* Main content styles */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}
.main{margin-left:240px;width:100%;padding:30px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
form{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);max-width:500px;}
input, textarea{width:100%;padding:10px;margin:10px 0;border-radius:6px;border:1px solid #ccc;}
button{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;background:#3b82f6;color:white;margin-top:10px;}
button:hover{background:#1e40af;}
</style>
</head>

<body>

<!-- Sidebar placeholder -->
<div id="sidebar-placeholder"></div>

<!-- Main content -->
<div class="main">
<div class="topbar">
<h1>Add Route</h1>
</div>

<form id="addRouteForm">
<label>Start Point</label>
<input type="text" id="start_point" required>

<label>End Point</label>
<input type="text" id="end_point" required>

<label>Stops (comma separated)</label>
<textarea id="stops" placeholder="Stop1, Stop2, Stop3"></textarea>

<button type="submit">Add Route</button>
</form>
</div>

<script>
// Load sidebar dynamically
fetch('sidebar.html')
.then(res => res.text())
.then(html => {
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

// Logout function (from sidebar)
function logout(){
    localStorage.removeItem("adminName");
    window.location.href="admin-login.html";
}

// Add Route form submission
document.getElementById("addRouteForm").addEventListener("submit", function(e){
    e.preventDefault();
    
    const start_point = document.getElementById("start_point").value;
    const end_point = document.getElementById("end_point").value;
    const stops = document.getElementById("stops").value;

    fetch("http://127.0.0.1:5000/add_route", {
        method:"POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ start_point, end_point, stops })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        document.getElementById("addRouteForm").reset();
        window.location.href = "routes.html";
    })
    .catch(err => console.error(err));
});
</script>

</body>
</html>
