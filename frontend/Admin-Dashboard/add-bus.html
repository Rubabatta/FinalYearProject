<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Bus - Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    background:
    radial-gradient(circle at top left,#dbeafe,#eef2ff 40%),
    radial-gradient(circle at bottom right,#bfdbfe,#eef2ff 45%);
    min-height:100vh;
    overflow-x:hidden;
}
#sidebar-placeholder{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:100;}
.main{margin-left:240px;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.add-card{width:100%;max-width:390px;padding:22px;border-radius:24px;background:rgba(255,255,255,0.95);backdrop-filter:blur(14px);box-shadow:0 18px 40px rgba(37,99,235,0.10),0 6px 16px rgba(15,23,42,0.08);}
.form-top{text-align:center;margin-bottom:18px;}
.form-icon{width:56px;height:56px;border-radius:16px;margin:auto;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2563eb,#1e40af);color:white;font-size:22px;margin-bottom:12px;}
.form-top h1{color:#1e3a8a;font-size:22px;margin-bottom:4px;font-weight:700;}
.form-top p{color:#64748b;font-size:12px;}
.input-group{position:relative;margin-bottom:13px;}
.input-group i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:13px;}
.input-group input,
.input-group select{width:100%;padding:12px 14px 12px 40px;border:none;outline:none;border-radius:12px;background:#f8fafc;font-size:13px;color:#0f172a;border:1.5px solid transparent;transition:0.3s;}
.input-group input:focus,
.input-group select:focus{background:white;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,0.10);}
button{width:100%;border:none;padding:13px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:0.3s;}
button:hover{transform:translateY(-2px);}
@media(max-width:768px){#sidebar-placeholder{position:relative;width:100%;height:auto;} .main{margin-left:0;padding:20px;} .add-card{max-width:100%;padding:24px;}}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>
<div id="header-placeholder"></div>

<div class="main">

<div class="add-card">
<div class="form-top">
    <div class="form-icon">
        <i class="fa-solid fa-bus-simple"></i>
    </div>
    <h1>Add Bus</h1>
    <p>Assign a bus to a route</p>
</div>

<div class="input-group">
<i class="fa fa-hashtag"></i>
<input type="text" id="busNumber" placeholder="Bus Number">
</div>

<div class="input-group">
<i class="fa fa-road"></i>
<select id="routeSelect"></select>
</div>

<button type="button" onclick="addBus()">Add Bus</button>

</div>
</div>

<script>

fetch("sidebar.html")
.then(r=>r.text())
.then(d=>document.getElementById("sidebar-placeholder").innerHTML=d);

fetch('header.html')
.then(r=>r.text())
.then(d=>{
    const ph = document.getElementById('header-placeholder');
    ph.innerHTML = d;
    ph.querySelectorAll('script').forEach(s=>{
        const ns = document.createElement('script');
        if(s.src) ns.src = s.src; else ns.textContent = s.textContent;
        document.body.appendChild(ns);
        document.body.removeChild(ns);
    });
});

/* 🔥 IMPORTANT FIX: SINGLE API VARIABLE */
const API = "https://acceptable-solace-production-06f3.up.railway.app";

/* ======================
   LOAD ROUTES (FIXED)
====================== */
async function loadRoutes(){

    try{
        const res = await fetch(`${API}/get_routes`);

        if(!res.ok){
            throw new Error("API not responding");
        }

        const routes = await res.json();

        const select = document.getElementById("routeSelect");

        select.innerHTML = `<option value="">Select Route</option>`;

        routes.forEach(r=>{
            const option = document.createElement("option");
            option.value = r.id;
            option.textContent = `${r.start_point} → ${r.end_point}`;
            select.appendChild(option);
        });

    }catch(err){
        console.log("ROUTE ERROR:", err);
        alert("Routes failed to load ❌ Check Railway server");
    }
}

/* ======================
   ADD BUS (FIXED)
====================== */
async function addBus(){

    let bus_number = document.getElementById("busNumber").value;
    let route_id = document.getElementById("routeSelect").value;

    if(!bus_number || !route_id){
        alert("Fill all fields");
        return;
    }

    // Validation: Check if bus number or route already exists
    try{
        const busesRes = await fetch(`${API}/get_buses`);
        const buses = await busesRes.json();
        const existingBus = buses.find(b => b.bus_number == bus_number);
        const existingRoute = buses.find(b => String(b.route_id) == String(route_id));

        if(existingBus){
            alert("This bus number is already assigned to a route.");
            return;
        }

        if(existingRoute){
            alert("This route already has a bus assigned.");
            return;
        }
    }catch(err){
        console.log("VALIDATION ERROR:", err);
        alert("Unable to validate bus details.");
        return;
    }

    try{
        const res = await fetch(`${API}/add_bus`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                bus_number,
                route_id
            })
        });

        const data = await res.json();

        if(res.ok){
            alert("Bus added successfully ✔️");
            document.getElementById("busNumber").value="";
            document.getElementById("routeSelect").value="";
        } else {
            alert(data.message || "Server error");
        }

    }catch(err){
        console.log("ADD BUS ERROR:", err);
        alert("Backend not responding ❌");
    }
}

/* INIT */
document.addEventListener("DOMContentLoaded", loadRoutes);

</script>

</body>
</html>
