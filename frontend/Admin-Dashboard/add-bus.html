<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Bus - Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* Reset & Fonts */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}

/* Sidebar Placeholder */
#sidebar-placeholder{position:fixed;left:0;top:0;height:100%;z-index:10;}

/* Main Content */
.main{margin-left:240px;padding:40px;width:100%;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.topbar h1{color:#1e3a8a;font-size:28px;}
.topbar button{padding:8px 15px;background:#ef4444;color:white;border:none;border-radius:6px;cursor:pointer;}
.topbar button:hover{background:#b91c1c;}

/* Form Box */
.form-box{background:white;padding:30px;border-radius:10px;width:450px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.form-box label{display:block;margin-top:15px;font-weight:500;color:#1e3a8a;}
.form-box input,
.form-box select{width:100%;padding:12px;margin-top:5px;border:1px solid #ccc;border-radius:6px;font-size:15px;}
button.add-btn{margin-top:25px;padding:12px 20px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;font-size:16px;}
button.add-btn:hover{background:#1e40af;}
</style>
</head>

<body>

<!-- Sidebar -->
<div id="sidebar-placeholder"></div>

<!-- Main Content -->
<div class="main">
<div class="topbar">
<h1>Add New Bus</h1>
<button onclick="logout()">Logout <i class="fas fa-sign-out-alt"></i></button>
</div>

<div class="form-box">
<label>Bus Number</label>
<input type="text" id="busNumber" placeholder="Enter Bus Number">

<label>Route</label>
<select id="routeSelect">
<option value="">Select Route</option>
</select>

<button class="add-btn" onclick="addBus()">Add Bus</button>
</div>
</div>

<script>
// Fetch Sidebar
fetch('sidebar.html')
.then(res => res.text())
.then(html => {
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

// Logout
function logout(){
    localStorage.removeItem("adminName");
    window.location.href="admin-login.html";
}

// Load Routes
async function loadRoutes(){
    try{
        const resRoutes = await fetch('http://127.0.0.1:5000/get_routes');
        const routes = await resRoutes.json();

        const select = document.getElementById("routeSelect");
        select.innerHTML = `<option value="">Select Route</option>`;

        routes.forEach(route=>{
            const option = document.createElement("option");
            option.value = route.id;
            option.textContent = `${route.start_point} → ${route.end_point}`;
            select.appendChild(option);
        });

    }catch(err){
        console.error("Error loading routes:", err);
        alert("Failed to load routes. Check server.");
    }
}

// Add Bus
async function addBus(){
    const bus_number = document.getElementById("busNumber").value.trim();
    const route_id = document.getElementById("routeSelect").value;

    if(bus_number === "" || route_id === ""){
        alert("Please fill all fields");
        return;
    }

    try{
        const res = await fetch("http://127.0.0.1:5000/add_bus",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({bus_number, route_id})
        });
        const data = await res.json();
        alert(data.message);
        if(res.ok){
            document.getElementById("busNumber").value="";
            loadRoutes(); // Refresh dropdown
        }
    }catch(err){
        console.error("Error:", err);
        alert("Server error, check console");
    }
}

// Initial Load
document.addEventListener("DOMContentLoaded", loadRoutes);
</script>

</body>
</html>
