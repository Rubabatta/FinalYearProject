<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Bus - Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}

#sidebar-placeholder{
    position:fixed;
    left:0;
    top:0;
    height:100%;
}

.main{
    margin-left:240px;
    padding:40px;
    width:100%;
}

h1{color:#1e3a8a;margin-bottom:20px;}

.form-box{
    background:white;
    padding:30px;
    width:450px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

label{
    display:block;
    margin-top:15px;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    margin-top:20px;
    padding:10px;
    width:100%;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{background:#1e40af;}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>

<div class="main">

<h1>Add New Bus</h1>

<div class="form-box">

<label>Bus Number</label>
<input type="text" id="busNumber">

<label>Route</label>
<select id="routeSelect">
<option value="">Loading routes...</option>
</select>

<button onclick="addBus()">Add Bus</button>

</div>
</div>

<script>

fetch("sidebar.html")
.then(r=>r.text())
.then(d=>document.getElementById("sidebar-placeholder").innerHTML=d);

/* 🔥 IMPORTANT FIX: SINGLE API VARIABLE */
const API = "https://acceptable-solace-production-06f3.up.railway.app";

/* ======================
   LOAD ROUTES (FIXED)
====================== */
async function loadRoutes(){

    try{
        const res = await fetch(`${API}/get_routes`);

        if(!res.ok){
            throw new Error("API not responding");
        }

        const routes = await res.json();

        const select = document.getElementById("routeSelect");

        select.innerHTML = `<option value="">Select Route</option>`;

        routes.forEach(r=>{
            const option = document.createElement("option");
            option.value = r.id;
            option.textContent = `${r.start_point} → ${r.end_point}`;
            select.appendChild(option);
        });

    }catch(err){
        console.log("ROUTE ERROR:", err);
        alert("Routes failed to load ❌ Check Railway server");
    }
}

/* ======================
   ADD BUS (FIXED)
====================== */
async function addBus(){

    let bus_number = document.getElementById("busNumber").value;
    let route_id = document.getElementById("routeSelect").value;

    if(!bus_number || !route_id){
        alert("Fill all fields");
        return;
    }

    try{
        const res = await fetch(`${API}/add_bus`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                bus_number,
                route_id
            })
        });

        const data = await res.json();

        if(res.ok){
            alert("Bus added successfully ✔️");
            document.getElementById("busNumber").value="";
            document.getElementById("routeSelect").value="";
        } else {
            alert(data.message || "Server error");
        }

    }catch(err){
        console.log("ADD BUS ERROR:", err);
        alert("Backend not responding ❌");
    }
}

/* INIT */
document.addEventListener("DOMContentLoaded", loadRoutes);

</script>

</body>
</html>
