<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buses Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}

.main{
    margin-left:240px;
    width:100%;
    padding:30px;
}

h1{
    color:#1e3a8a;
    margin-bottom:20px;
}

.action-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

input{
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
    width:250px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#3b82f6;
    color:white;
}

.table-box{
    background:white;
    padding:25px;
    border-radius:12px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#3b82f6;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div class="main">

<h1>Buses Management</h1>

<div class="action-row">
<input type="text" id="searchInput" placeholder="Search bus...">
<button onclick="searchBuses()">Search</button>
</div>

<div class="table-box">
<table>
<tr>
<th>Bus No</th>
<th>Route</th>
</tr>
<tbody id="busTable"></tbody>
</table>
</div>

</div>

<script>

const API = "https://acceptable-solace-production-06f3.up.railway.app";

let routes = [];
let buses = [];

/* SIDEBAR */
fetch("sidebar.html")
.then(r => r.text())
.then(d => document.getElementById("sidebar").innerHTML = d);

/* LOAD ROUTES FIRST */
async function loadRoutes(){
    try {
        const res = await fetch(`${API}/get_routes`);
        routes = await res.json();
    } catch (e) {
        console.log("Routes error", e);
        alert("Routes load failed ❌");
    }
}

/* LOAD BUSES */
async function loadBuses(){
    try {
        const res = await fetch(`${API}/get_buses`);
        buses = await res.json();

        const table = document.getElementById("busTable");
        table.innerHTML = "";

        buses.forEach(bus => {

            const route = routes.find(r => String(r.id) === String(bus.route_id));

            const routeText = route
                ? `${route.start_point} → ${route.end_point}`
                : "No Route";

            table.innerHTML += `
                <tr>
                    <td>${bus.bus_number}</td>
                    <td>${routeText}</td>
                </tr>
            `;
        });

    } catch (e) {
        console.log("Bus error", e);
        alert("Bus load failed ❌");
    }
}

/* INIT (IMPORTANT ORDER FIX) */
async function init(){
    await loadRoutes();   // pehle routes
    await loadBuses();    // phir buses
}

init();

/* SEARCH */
function searchBuses(){
    let q = document.getElementById("searchInput").value.toLowerCase();
    let rows = document.querySelectorAll("#busTable tr");

    rows.forEach(r=>{
        r.style.display = r.innerText.toLowerCase().includes(q) ? "" : "none";
    });
}

</script>

</body>
</html>
