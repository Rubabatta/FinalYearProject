<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buses Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}

.main{
    margin-left:240px;
    width:100%;
    padding:30px;
}

h1{
    color:#1e3a8a;
    margin-bottom:20px;
}

.action-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

input{
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
    width:250px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#3b82f6;
    color:white;
    transition:0.3s;
}

button:hover{
    background:#1e40af;
}

.table-box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#3b82f6;
    color:white;
    padding:10px;
    text-align:left;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f1f5ff;
}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>

<div class="main">

<h1>Buses Management</h1>

<div class="action-row">
<button onclick="window.location.href='add-bus.html'">Add Bus</button>
<button onclick="deleteSelectedBus()">Delete Selected</button>

<input type="text" id="searchInput" placeholder="Search bus or route...">
<button onclick="searchBuses()">Search</button>
</div>

<div class="table-box">
<table>
<tr>
<th>Select</th>
<th>Bus Number</th>
<th>Route</th>
<th>Actions</th>
</tr>
<tbody id="busTable"></tbody>
</table>
</div>

</div>

<script>

// Sidebar
fetch('sidebar.html')
.then(res => res.text())
.then(html => {
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

const API_URL = "https://acceptable-solace-production-06f3.up.railway.app";

let allRoutes = [];
let allBuses = [];

// Load data
document.addEventListener("DOMContentLoaded", async () => {
    await loadRoutes();
    await loadBuses();
});

// Routes
async function loadRoutes(){
    try{
        const res = await fetch(`${API_URL}/get_routes`);
        allRoutes = await res.json();
    }catch(err){
        console.error("Routes error:", err);
        alert("Routes load failed");
    }
}

// Buses
async function loadBuses(){
    try{
        const res = await fetch(`${API_URL}/get_all_buses`);
        allBuses = await res.json();

        const table = document.getElementById("busTable");
        table.innerHTML = "";

        allBuses.forEach(bus => {

            const route = allRoutes.find(r => r.id == bus.route_id);

            const routeName = route
                ? `${route.start_point} → ${route.end_point}`
                : (bus.start_point && bus.end_point ? `${bus.start_point} → ${bus.end_point}` : "N/A");

            const row = document.createElement("tr");

            row.innerHTML = `
                <td><input type="checkbox" data-id="${bus.id}"></td>
                <td>${bus.bus_number}</td>
                <td>${routeName}</td>
                <td>
                    <button onclick="updateBus(${bus.id})">Edit</button>
                </td>
            `;

            table.appendChild(row);
        });

    }catch(err){
        console.error("Buses error:", err);
        alert("Failed to load buses");
    }
}

// Delete
function deleteSelectedBus(){

    const selected = document.querySelectorAll('#busTable input[type="checkbox"]:checked');

    if(selected.length === 0){
        alert("Select bus first!");
        return;
    }

    if(!confirm("Delete selected buses?")) return;

    selected.forEach(async (box) => {
        const id = box.getAttribute("data-id");

        await fetch(`${API_URL}/delete_bus/${id}`,{
            method:"DELETE"
        });

        loadBuses();
    });
}

// Search
function searchBuses(){
    const q = document.getElementById("searchInput").value.toLowerCase();
    const rows = document.querySelectorAll("#busTable tr");

    rows.forEach(row=>{
        row.style.display =
        row.innerText.toLowerCase().includes(q)
        ? ""
        : "none";
    });
}

// Edit
function updateBus(id){
    window.location.href = `update-bus.html?id=${id}`;
}

</script>

</body>
</html>
