<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buses Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"> 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}

.main{
    margin-left:240px;
    width:100%;
    padding:30px;
}

h1{
    color:#1e3a8a;
    margin-bottom:20px;
}

.page-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:15px;
    margin-bottom:20px;
}

.page-header h1{
    margin-bottom:0;
}

.action-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
    align-items:center;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#3b82f6;
    color:white;
    transition:0.3s;
}

.icon-btn{
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-right:6px;
    color:white;
    font-size:12px;
    width:32px;
    height:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.3s;
}

.icon-btn:hover{
    transform:scale(1.08);
}

.icon-btn.edit{background:#f59e0b;}
.icon-btn.delete{background:#ef4444;}

button:hover{
    background:#1e40af;
}

td:last-child{display:flex;align-items:center;gap:6px;white-space:nowrap;}

.table-box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#3b82f6;
    color:white;
    padding:10px;
    text-align:left;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f1f5ff;
}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>

<div id="header-placeholder"></div>

<div class="main">

<div class="page-header">
<h1>Buses Management</h1>
<button onclick="window.location.href='add-bus.html'">Add Bus</button>
</div>

<div class="table-box">
<table>
<tr>
<th>Bus Number</th>
<th>Route</th>
<th>Actions</th>
</tr>
<tbody id="busTable"></tbody>
</table>
</div>

</div>

<script>

// Sidebar
fetch('sidebar.html')
.then(res => res.text())
.then(html => {
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

// Header
fetch('header.html')
.then(res => res.text())
.then(html => { 
    const ph = document.getElementById('header-placeholder');
    ph.innerHTML = html;
    ph.querySelectorAll('script').forEach(s=>{
        const ns = document.createElement('script');
        if(s.src) ns.src = s.src; else ns.textContent = s.textContent;
        document.body.appendChild(ns);
        document.body.removeChild(ns);
    });
});

const API_URL = "https://acceptable-solace-production-06f3.up.railway.app";

let allRoutes = [];
let allBuses = [];

// Load data
document.addEventListener("DOMContentLoaded", async () => {
    await loadRoutes();
    await loadBuses();
});

// Routes
async function loadRoutes(){
    try{
        const res = await fetch(`${API_URL}/get_routes`);
        allRoutes = await res.json();
    }catch(err){
        console.error("Routes error:", err);
        alert("Routes load failed");
    }
}

// Buses
async function loadBuses(){
    try{
        const res = await fetch(`${API_URL}/get_buses`);
        allBuses = await res.json();

        const table = document.getElementById("busTable");
        table.innerHTML = "";

        allBuses.forEach(bus => {

            const route = allRoutes.find(r => r.id == bus.route_id);

            const routeName = route
                ? `${route.start_point} → ${route.end_point}`
                : (bus.start_point && bus.end_point ? `${bus.start_point} → ${bus.end_point}` : "N/A");

            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${bus.bus_number.split('-')[1] || bus.bus_number}</td>
                <td>${routeName}</td>
                <td>
                    <button class="icon-btn edit" title="Edit" onclick="updateBus(${bus.id})">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button class="icon-btn delete" title="Delete" onclick="deleteBus(${bus.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </td>
            `;

            table.appendChild(row);
        });

    }catch(err){
        console.error("Buses error:", err);
        alert("Failed to load buses");
    }
}

// Edit
function updateBus(id){
    window.location.href = `update-bus.html?id=${id}`;
}

// Delete single bus
async function deleteBus(id){
    if(!confirm("Delete this bus?")) return;
    await fetch(`${API_URL}/delete_bus/${id}`,{ method:"DELETE" });
    loadBuses();
}

</script>

</body>
</html>
