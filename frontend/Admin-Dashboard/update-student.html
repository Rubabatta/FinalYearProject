<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Student</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    background:
    radial-gradient(circle at top left,#dbeafe,#eef2ff 40%),
    radial-gradient(circle at bottom right,#bfdbfe,#eef2ff 45%);
    min-height:100vh;
    overflow-x:hidden;
}
#sidebar-placeholder{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:100;}
.main{margin-left:240px;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.add-card{width:100%;max-width:420px;padding:28px;border-radius:24px;background:rgba(255,255,255,0.95);backdrop-filter:blur(14px);box-shadow:0 18px 40px rgba(37,99,235,0.10),0 6px 16px rgba(15,23,42,0.08);}
.form-top{text-align:center;margin-bottom:18px;}
.form-icon{width:56px;height:56px;border-radius:16px;margin:auto;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2563eb,#1e40af);color:white;font-size:22px;margin-bottom:12px;}
.form-top h1{color:#1e3a8a;font-size:22px;margin-bottom:4px;font-weight:700;}
.form-top p{color:#64748b;font-size:12px;}
.input-group{position:relative;margin-bottom:13px;}
.input-group i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:13px;}
.input-group input{width:100%;padding:12px 14px 12px 40px;border:none;outline:none;border-radius:12px;background:#f8fafc;font-size:13px;color:#0f172a;border:1.5px solid transparent;transition:0.3s;}
.input-group input:focus{background:white;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,0.10);}
button{width:100%;border:none;padding:13px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:0.3s;}
button:hover{transform:translateY(-2px);}
#message{margin-top:10px;text-align:center;font-size:12px;font-weight:500;}
@media(max-width:768px){#sidebar-placeholder{position:relative;width:100%;height:auto;} .main{margin-left:0;padding:20px;} .add-card{max-width:100%;padding:24px;}}
</style>
</head>

<body>
<div id="sidebar-placeholder"></div>
<div class="main">
<div class="add-card">
<div class="form-top">
    <div class="form-icon">
        <i class="fa-solid fa-user-pen"></i>
    </div>
    <h1>Update Student</h1>
    <p>Edit student details</p>
</div>

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" id="name" placeholder="Name">
</div>

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Email">
</div>

<div class="input-group">
<i class="fa fa-phone"></i>
<input type="text" id="contact" placeholder="Contact">
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="text" id="password" placeholder="Password">
</div>

<button type="button" onclick="updateStudent()">Update Student</button>
<p id="message"></p>
</div>
</div>

<script>
fetch('sidebar.html')
.then(res => res.text())
.then(html => document.getElementById('sidebar-placeholder').innerHTML = html);

const urlParams = new URLSearchParams(window.location.search);
const studentId = urlParams.get('id');

function loadStudent(){

fetch(`https://acceptable-solace-production-06f3.up.railway.app/get_student/${studentId}`)
.then(res=>res.json())
.then(data=>{

document.getElementById("name").value=data.name;
document.getElementById("email").value=data.email;
document.getElementById("contact").value=data.contact;
document.getElementById("password").value=data.password;

});

}

function updateStudent(){

let data={

name:document.getElementById("name").value,
email:document.getElementById("email").value,
contact:document.getElementById("contact").value,
password:document.getElementById("password").value

};

fetch(`https://acceptable-solace-production-06f3.up.railway.app/update_student/${studentId}`,{

method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)

})
.then(res=>res.json())
.then(data=>{

alert(data.message);

window.location.href="student-data.html";

});

}

loadStudent();

</script>

</body>
</html>
