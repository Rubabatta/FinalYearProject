<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Stops</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
    background:
    radial-gradient(circle at top left,#dbeafe,#eef2ff 40%),
    radial-gradient(circle at bottom right,#bfdbfe,#eef2ff 45%);
    min-height:100vh;
    overflow-x:hidden;
}
#sidebar-placeholder{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:100;}
.main{margin-left:240px;min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:24px;padding:20px;}
.page-title{width:100%;max-width:640px;}
.page-title h1{color:#1e3a8a;margin-bottom:20px;font-size:2rem;}
.add-card{background:rgba(255,255,255,0.95);padding:22px;border-radius:24px;width:100%;max-width:520px;backdrop-filter:blur(14px);box-shadow:0 18px 40px rgba(37,99,235,0.10),0 6px 16px rgba(15,23,42,0.08);}
.form-top{text-align:center;margin-bottom:18px;}
.form-icon{width:56px;height:56px;border-radius:16px;margin:auto;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#2563eb,#1e40af);color:white;font-size:22px;margin-bottom:12px;}
.form-top h1{color:#1e3a8a;font-size:22px;margin-bottom:4px;font-weight:700;}
.form-top p{color:#64748b;font-size:12px;}
.input-group{position:relative;margin-bottom:13px;}
.input-group i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:13px;}
.input-group input,
.input-group select{width:100%;padding:12px 14px 12px 40px;border:none;outline:none;border-radius:12px;background:#f8fafc;font-size:13px;color:#0f172a;border:1.5px solid transparent;transition:0.3s;}
.input-group input:focus,
.input-group select:focus{background:white;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,0.10);}
button.add-stop{width:100%;border:none;padding:13px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:0.3s;box-shadow:0 14px 30px rgba(37,99,235,0.14);}
button.add-stop:hover{transform:translateY(-2px);}
button.add-stop:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none;}
.table-box{background:white;padding:24px;border-radius:18px;margin-top:20px;box-shadow:0 18px 40px rgba(15,23,42,0.08);width:100%;max-width:640px;}
.table-box h3{margin:0 0 14px;color:#1e3a8a;}
.table-box table{width:100%;border-collapse:collapse;}
.table-box th{background:#2563eb;color:white;padding:12px;text-align:left;border-radius:12px 12px 0 0;}
.table-box td{padding:12px;border-bottom:1px solid #e2e8f0;color:#334155;}
.icon-btn{border:none;border-radius:10px;cursor:pointer;margin-right:6px;color:white;font-size:12px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:0.3s;}
.icon-btn:hover{transform:scale(1.08);}
.icon-btn.edit{background:#f59e0b;}
.icon-btn.delete{background:#ef4444;}

td:last-child{display:flex;align-items:center;gap:6px;white-space:nowrap;}
@media(max-width:768px){#sidebar-placeholder{position:relative;width:100%;height:auto;} .main{margin-left:0;padding:20px;} .add-card{max-width:100%;padding:24px;}}
</style>
</head>
<body>

<div id="sidebar-placeholder"></div>

<div class="main">
<div class="page-title">
    <h1>Add / Manage Stops</h1>
</div>

<div class="add-card">
<div class="form-top">
    <div class="form-icon">
        <i class="fa-solid fa-map-pin"></i>
    </div>
    <h1>Add Stops</h1>
    <p>Select a route and enter stop names</p>
</div>

<div class="input-group">
<i class="fa-solid fa-route"></i>
<select id="routeSelect"></select>
</div>

<div class="stop-list">
<label>Stop 1</label><input type="text" class="stop">
<label>Stop 2</label><input type="text" class="stop">
<label>Stop 3</label><input type="text" class="stop">
<label>Stop 4</label><input type="text" class="stop">
<label>Stop 5</label><input type="text" class="stop">
</div>

<button type="button" class="add-stop" onclick="addStops()">Add Stops</button>
</div>

<div class="table-box">
<h3>Current Stops</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Stop Name</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="stopsTable"></tbody>
</table>
</div>

</div>

<script>

fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{ document.getElementById("sidebar-placeholder").innerHTML=data; });

async function loadRoutes(){
const res = await fetch("https://acceptable-solace-production-06f3.up.railway.app/get_routes");
const data = await res.json();
let options = '<option value="">-- Select Route --</option>';
data.forEach(route=>{
options += `<option value="${route.id}">${route.start_point} → ${route.end_point}</option>`;
});
document.getElementById("routeSelect").innerHTML = options;
}
loadRoutes();

const addButton = document.querySelector(".add-stop");
const stopInputs = Array.from(document.querySelectorAll(".stop"));

function updateAddButtonState(){
    const hasStop = stopInputs.some(stop => stop.value.trim().length > 0);
    addButton.disabled = !hasStop;
}

stopInputs.forEach(stop => stop.addEventListener("input", updateAddButtonState));

updateAddButtonState();

document.getElementById("routeSelect").addEventListener("change", loadStops);

async function loadStops(){

const routeId = document.getElementById("routeSelect").value;

if(!routeId){
document.getElementById("stopsTable").innerHTML="";
return;
}

const res = await fetch(`https://acceptable-solace-production-06f3.up.railway.app/get_stops/${routeId}`);
const data = await res.json();

let rows = '';
let count = 1;

const visibleStops = data.filter(stop => stop.stop_name && stop.stop_name.trim().length > 0);
visibleStops.forEach(stop=>{

rows += `<tr>

<td>${count++}</td>

<td>${stop.stop_name}</td>

<td>

<button class="icon-btn edit" onclick="editStop(${stop.id},\`${stop.stop_name}\`)">
<i class="fa-solid fa-pen-to-square"></i>
</button>

<button class="icon-btn delete" onclick="deleteStop(${stop.id})">
<i class="fa-solid fa-trash-can"></i>
</button>

</td>

</tr>`;

});

document.getElementById("stopsTable").innerHTML = rows;

}

async function addStops(){

const routeId = document.getElementById("routeSelect").value;

if(!routeId){
alert("Select a route first!");
return;
}

const stops = Array.from(document.querySelectorAll(".stop"));
const stopNames = stops
.map(stop => stop.value.trim())
.filter(name => name.length > 0);

const hasSpacesOnly = stops.some(stop => stop.value.length > 0 && stop.value.trim().length === 0);
if(hasSpacesOnly){
alert("Please remove blank stop entries or type a stop name.");
return;
}

if(stopNames.length === 0){
alert("Enter at least one stop name before adding.");
return;
}

const promises = stopNames.map(name =>
fetch("https://acceptable-solace-production-06f3.up.railway.app/add_stop",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({route_id:routeId, stop_name:name})
})
.then(res=>res.json())
.then(data=>console.log(data.message))
.catch(err=>console.error(err))
);

await Promise.all(promises);

stops.forEach(stop => stop.value = "");

loadStops();

}

async function deleteStop(id){

const res = await fetch(`https://acceptable-solace-production-06f3.up.railway.app/delete_stop/${id}`, {method:"DELETE"});

const data = await res.json();

alert(data.message);

loadStops();

}

function editStop(id, oldName){

const newName = prompt("Enter new stop name:", oldName);

if(newName && newName.trim() !== ""){

fetch(`https://acceptable-solace-production-06f3.up.railway.app/update_stop/${id}`,{

method:"PUT",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({stop_name:newName.trim()})

})

.then(res=>{

if(res.ok) return res.json();

else throw new Error("Failed to update stop");

})

.then(data=>{

alert(data.message);

loadStops();

})

.catch(err=>{

console.error(err);

alert("Error updating stop");

});

}

}

</script>

</body>
</html>
