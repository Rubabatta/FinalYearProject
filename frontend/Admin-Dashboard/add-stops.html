<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Stops</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}
.main{margin-left:240px;width:100%;padding:30px;}
h1{color:#1e3a8a;margin-bottom:20px;}
.form-box{background:white;padding:30px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);max-width:600px;}
label{display:block;margin-top:15px;font-weight:500;}
select,input{width:100%;padding:10px;margin-top:6px;border:1px solid #ccc;border-radius:6px;}
button.add-stop{margin-top:20px;padding:10px 20px;border:none;border-radius:6px;background:#3b82f6;color:white;cursor:pointer;transition:0.3s;}
button.add-stop:hover{background:#1e40af;}
.stop-list{margin-top:15px;}
.table-box{background:white;padding:20px;border-radius:10px;margin-top:20px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.table-box table{width:100%;border-collapse:collapse;}
.table-box th{background:#3b82f6;color:white;padding:10px;text-align:left;}
.table-box td{padding:10px;border-bottom:1px solid #eee;}

.icon-btn{
background:none;
border:none;
cursor:pointer;
font-size:16px;
margin-right:8px;
}

.icon-btn.edit{color:#f59e0b;}
.icon-btn.edit:hover{color:#b45309;}

.icon-btn.delete{color:#ef4444;}
.icon-btn.delete:hover{color:#dc2626;}

</style>
</head>
<body>

<div id="sidebar-placeholder"></div>

<div class="main">
<h1>Add / Manage Stops</h1>

<div class="form-box">
<label>Select Route</label>
<select id="routeSelect"></select>

<div class="stop-list">
<label>Stop 1</label><input type="text" class="stop">
<label>Stop 2</label><input type="text" class="stop">
<label>Stop 3</label><input type="text" class="stop">
<label>Stop 4</label><input type="text" class="stop">
<label>Stop 5</label><input type="text" class="stop">
</div>

<button class="add-stop" onclick="addStops()">Add Stops</button>
</div>

<div class="table-box">
<h3>Current Stops</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Stop Name</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="stopsTable"></tbody>
</table>
</div>

</div>

<script>

fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{ document.getElementById("sidebar-placeholder").innerHTML=data; });

async function loadRoutes(){
const res = await fetch("http://127.0.0.1:5000/get_routes");
const data = await res.json();
let options = '<option value="">-- Select Route --</option>';
data.forEach(route=>{
options += `<option value="${route.id}">${route.start_point} → ${route.end_point}</option>`;
});
document.getElementById("routeSelect").innerHTML = options;
}
loadRoutes();

document.getElementById("routeSelect").addEventListener("change", loadStops);

async function loadStops(){

const routeId = document.getElementById("routeSelect").value;

if(!routeId){
document.getElementById("stopsTable").innerHTML="";
return;
}

const res = await fetch(`http://127.0.0.1:5000/get_stops/${routeId}`);
const data = await res.json();

let rows = '';
let count = 1;

data.forEach(stop=>{

rows += `<tr>

<td>${count++}</td>

<td>${stop.stop_name}</td>

<td>

<button class="icon-btn edit" onclick="editStop(${stop.id},\`${stop.stop_name}\`)">
<i class="fa-solid fa-pen"></i>
</button>

<button class="icon-btn delete" onclick="deleteStop(${stop.id})">
<i class="fa-solid fa-trash"></i>
</button>

</td>

</tr>`;

});

document.getElementById("stopsTable").innerHTML = rows;

}

async function addStops(){

const routeId = document.getElementById("routeSelect").value;

if(!routeId){
alert("Select a route first!");
return;
}

const stops = document.querySelectorAll(".stop");

const promises = [];

stops.forEach(stop=>{

const name = stop.value.trim();

if(name !== ""){

promises.push(

fetch("http://127.0.0.1:5000/add_stop",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({route_id:routeId, stop_name:name})

})

.then(res=>res.json())

.then(data=>console.log(data.message))

.catch(err=>console.error(err))

);

stop.value = "";

}

});

await Promise.all(promises);

loadStops();

}

async function deleteStop(id){

const res = await fetch(`http://127.0.0.1:5000/delete_stop/${id}`, {method:"DELETE"});

const data = await res.json();

alert(data.message);

loadStops();

}

function editStop(id, oldName){

const newName = prompt("Enter new stop name:", oldName);

if(newName && newName.trim() !== ""){

fetch(`http://127.0.0.1:5000/update_stop/${id}`,{

method:"PUT",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({stop_name:newName.trim()})

})

.then(res=>{

if(res.ok) return res.json();

else throw new Error("Failed to update stop");

})

.then(data=>{

alert(data.message);

loadStops();

})

.catch(err=>{

console.error(err);

alert("Error updating stop");

});

}

}

</script>

</body>
</html>
