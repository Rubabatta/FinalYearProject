<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Announcements | Shuttle System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    background:#f4f6fb;
}

/* CONTENT */
.content{
    margin-left:240px;
    padding:40px;
    width:100%;
}

.content h1{
    margin-bottom:25px;
    color:#1e3a8a;
    font-size:24px;
}

/* ADD BUTTON */
.add-btn{
    background:#3b82f6;
    color:white;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
    transition:0.3s;
}

.add-btn:hover{
    background:#1e40af;
}

/* ANNOUNCEMENTS TABLE */
.announcement-table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.announcement-table th, .announcement-table td{
    padding:15px 20px;
    text-align:left;
    border-bottom:1px solid #f0f0f0;
}

.announcement-table th{
    background:#2563eb;
    color:white;
    font-weight:500;
}

.announcement-table tr:hover{
    background:#f0f4ff;
}

.actions i{
    margin-right:10px;
    cursor:pointer;
    color:#2563eb;
}

.actions i.delete{
    color:#ef4444;
}

/* MODAL */
.modal-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:200;
}

.modal{
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    position:relative;
}

.modal h3{
    margin-bottom:20px;
    color:#1e3a8a;
}

.modal input, .modal textarea{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
    outline:none;
    font-size:14px;
}

.modal button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

.close-modal{
    position:absolute;
    top:15px;
    right:15px;
    cursor:pointer;
    font-size:18px;
    color:#888;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN CONTENT -->
<div class="content">
<h1><i class="fas fa-bullhorn"></i> Announcements</h1>
<button class="add-btn" onclick="openModal()">+ Add Announcement</button>

<table class="announcement-table">
<thead>
<tr>
<th>Title</th>
<th>Message</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="announcement-body">
<!-- Dynamic announcements will load here -->
</tbody>
</table>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
<div class="modal">
<i class="fas fa-times close-modal" onclick="closeModal()"></i>
<h3>Add Announcement</h3>
<input type="text" id="ann-title" placeholder="Title" required>
<textarea id="ann-message" placeholder="Message" rows="4" required></textarea>
<button onclick="addAnnouncement()">Save</button>
</div>
</div>

<script>
// ----------------- SIDEBAR -----------------
fetch("sidebar.html")
.then(res => res.text())
.then(data=>{
    document.getElementById("sidebar").innerHTML = data;
})
.catch(err => console.error("Sidebar fetch error:", err));

// ----------------- ANNOUNCEMENTS -----------------
async function loadAnnouncements(){
    try {
        const res = await fetch("http://127.0.0.1:5000/get-announcements");
        const data = await res.json();
        const tbody = document.getElementById("announcement-body");
        tbody.innerHTML="";

        data.forEach(a=>{
            tbody.innerHTML += `
            <tr>
                <td>${a.title}</td>
                <td>${a.message}</td>
                <td>${a.date}</td>
                <td class="actions">
                    <i class="fas fa-edit" onclick='editAnnouncement(${JSON.stringify(a)})'></i>
                    <i class="fas fa-trash delete" onclick="deleteAnnouncement(${a.id})"></i>
                </td>
            </tr>`;
        });

    } catch(e){
        console.error("Load announcements error:", e);
    }
}

// ----------------- MODAL -----------------
function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

// ----------------- Add Announcement -----------------
async function addAnnouncement(){
    const title = document.getElementById("ann-title").value.trim();
    const message = document.getElementById("ann-message").value.trim();
    const date = new Date().toLocaleDateString();

    if(!title || !message){
        alert("Please fill all fields!");
        return;
    }

    try {
        const res = await fetch("http://127.0.0.1:5000/add-announcement", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({title,message,date})
        });

        const data = await res.json();
        console.log("Add response:", data);

        if(res.ok){
            closeModal();
            document.getElementById("ann-title").value="";
            document.getElementById("ann-message").value="";
            loadAnnouncements();
        } else {
            alert("Error: " + (data.message || "Failed to add"));
        }

    } catch(e){
        console.error("Add announcement fetch error:", e);
        alert("Failed to connect to server. Is backend running?");
    }
}

// ----------------- Delete Announcement -----------------
async function deleteAnnouncement(id){
    if(!confirm("Are you sure?")) return;

    try {
        const res = await fetch(`http://127.0.0.1:5000/delete-announcement/${id}`, {method:"DELETE"});
        const data = await res.json();
        console.log("Delete response:", data);
        loadAnnouncements();
    } catch(e){
        console.error("Delete announcement fetch error:", e);
    }
}

// ----------------- Edit Announcement -----------------
async function editAnnouncement(a){
    const newTitle = prompt("Edit Title", a.title);
    const newMsg = prompt("Edit Message", a.message);
    if(!newTitle || !newMsg) return;

    const date = new Date().toLocaleDateString();
    try {
        const res = await fetch(`http://127.0.0.1:5000/update-announcement/${a.id}`, {
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({title:newTitle,message:newMsg,date})
        });
        const data = await res.json();
        console.log("Edit response:", data);
        loadAnnouncements();
    } catch(e){
        console.error("Edit announcement fetch error:", e);
    }
}

// Initial load
loadAnnouncements();
</script>
</body>
</html>
