<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student - Admin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#dbeafe,#eef2ff 40%),
    radial-gradient(circle at bottom right,#bfdbfe,#eef2ff 45%);
    min-height:100vh;
    overflow-x:hidden;
}

#sidebar-placeholder{
    position:fixed;
    left:0;
    top:0;
    bottom:0;
    width:240px;
    z-index:100;
}

/* MAIN */

/* MAIN */

.main{
    margin-left:240px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */

.add-card{
    width:100%;
    max-width:390px;   /* 👈 chota width */
    padding:22px;      /* 👈 kam padding */
    border-radius:24px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(14px);
    box-shadow:
    0 18px 40px rgba(37,99,235,0.10),
    0 6px 16px rgba(15,23,42,0.08);
}

/* TOP */

.form-top{
    text-align:center;
    margin-bottom:18px;
}

.form-icon{
    width:56px;      /* 👈 smaller */
    height:56px;
    border-radius:16px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    color:white;
    font-size:22px;   /* 👈 smaller icon */
    margin-bottom:12px;
}

.form-top h1{
    color:#1e3a8a;
    font-size:22px;   /* 👈 smaller heading */
    margin-bottom:4px;
    font-weight:700;
}

.form-top p{
    color:#64748b;
    font-size:12px;
}

/* INPUTS */

.input-group{
    position:relative;
    margin-bottom:13px;
}

.input-group i{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:#94a3b8;
    font-size:13px;   /* 👈 smaller icon */
}

.input-group input{
    width:100%;
    padding:12px 14px 12px 40px;  /* 👈 smaller height */
    border:none;
    outline:none;
    border-radius:12px;
    background:#f8fafc;
    font-size:13px;   /* 👈 smaller text */
    color:#0f172a;
    border:1.5px solid transparent;
    transition:0.3s;
}

.input-group input:focus{
    background:white;
    border-color:#3b82f6;
    box-shadow:0 0 0 4px rgba(59,130,246,0.10);
}

/* BUTTON */

button{
    width:100%;
    border:none;
    padding:13px;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:14px;   /* 👈 smaller */
    font-weight:600;
    cursor:pointer;
    margin-top:4px;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

/* MESSAGE */

#message{
    margin-top:10px;
    text-align:center;
    font-size:12px;
    font-weight:500;
}

/* ANIMATION */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */

@media(max-width:768px){

    #sidebar-placeholder{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
        padding:20px;
    }

    .add-card{
        max-width:100%;
        padding:24px;
    }
}

</style>
</head>

<body>

<div id="sidebar-placeholder"></div>

<div class="main">

<div class="add-card">

<div class="form-top">
    <div class="form-icon">
        <i class="fa-solid fa-user-plus"></i>
    </div>

    <h1>Add Student</h1>
    <p>Create a new student account</p>
</div>

<form id="addStudentForm">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" id="firstName" placeholder="First Name" required>
</div>

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" id="lastName" placeholder="Last Name" required>
</div>

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Email Address" required>
</div>

<div class="input-group">
<i class="fa fa-id-card"></i>
<input type="text" id="studentID" placeholder="Registration Number" required>
</div>

<div class="input-group">
<i class="fa fa-building-columns"></i>
<input type="text" id="department" placeholder="Department" required>
</div>

<div class="input-group">
<i class="fa fa-graduation-cap"></i>
<input type="text" id="program" placeholder="Program" required>
</div>

<div class="input-group">
<i class="fa fa-phone"></i>
<input type="text" id="contact" placeholder="Contact Number" pattern="[0-9]{11}" minlength="11" maxlength="11" inputmode="numeric">
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="confirm" placeholder="Confirm Password" required>
</div>

<button type="submit">
    <i class="fa-solid fa-plus"></i>
    Add Student
</button>

<p id="message"></p>

</form>

</div>
</div>

<script>

fetch('sidebar.html')
.then(res => res.text())
.then(html => {
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

const form = document.getElementById("addStudentForm");
const message = document.getElementById("message");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim();
    const studentID = document.getElementById("studentID").value.trim();
    const department = document.getElementById("department").value.trim();
    const program = document.getElementById("program").value.trim();
    const contact = document.getElementById("contact").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirm").value.trim();

    if(password !== confirm){

        message.style.color = "red";
        message.innerText = "❌ Passwords do not match";
        return;
    }

    const passwordRegex =
    /^(?=.*[0-9])(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{6,}$/;

    if(!passwordRegex.test(password)){

        message.style.color = "red";
        message.innerText =
        "❌ Password must include number & special character";

        return;
    }

    fetch(
    'https://acceptable-solace-production-06f3.up.railway.app/student_signup',
    {
        method:'POST',
        headers:{'Content-Type':'application/json'},

        body:JSON.stringify({

            name:firstName + " " + lastName,
            email:email,
            password:password,
            studentID: studentID,
            department: department,
            program: program,
            contact:contact,
            fees:0
        })
    })

    .then(res => res.json())

    .then(data => {

        if(data.message.includes("success")){

            message.style.color = "#16a34a";
            message.innerText = "✅ Student Added Successfully";

            setTimeout(()=>{
                window.location.href="student-data.html";
            },1200);

        }else{

            message.style.color = "red";
            message.innerText = "❌ " + data.message;
        }
    })

    .catch(err=>{

        console.error(err);

        message.style.color = "red";
        message.innerText = "❌ Server Error!";
    });
});

</script>

</body>
</html>
