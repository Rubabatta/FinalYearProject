<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routes Management</title> 

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}
.main{margin-left:210px;width:100%;padding:30px;}
h1{color:#1e3a8a;margin-bottom:20px;}
.page-header{display:flex;align-items:center;justify-content:space-between;gap:15px;margin-bottom:20px;}
.page-header h1{margin-bottom:0;}
.action-row{display:flex;align-items:center;margin-bottom:15px;gap:10px;flex-wrap:wrap;}
.action-row label{margin-right:5px;font-weight:500;}
.action-row input{padding:8px;border-radius:6px;border:1px solid #ccc;width:200px;}
button{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;background:#3b82f6;color:white;transition:0.3s;}
button:hover{background:#1e40af;}
.icon-btn{border:none;border-radius:10px;cursor:pointer;margin-right:6px;color:white;font-size:12px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:0.3s;}
.icon-btn:hover{transform:scale(1.08);}
.icon-btn.edit{background:#f59e0b;}
.icon-btn.delete{background:#ef4444;}
.table-box{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);}

td:last-child{display:flex;align-items:center;gap:6px;white-space:nowrap;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
table th{background:#3b82f6;color:white;padding:10px;text-align:left;}
table td{padding:10px;border-bottom:1px solid #eee;}
.manage-btn{background:#10b981;}
.manage-btn:hover{background:#059669;}
.update-btn{background:#f59e0b;margin-left:5px;}
.update-btn:hover{background:#b45309;}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>

<div id="header-placeholder"></div>

<div class="main">

<div class="page-header">
<h1>Routes Management</h1>
<button onclick="window.location.href='add-route.html'">Add Route</button>
</div>

<!-- Table -->
<div class="table-box">
<table>
<thead>
<tr>
<th>ID</th>
<th>Start Point</th>
<th>End Point</th>
<th>Stops</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="routesTable"></tbody>
</table>
</div>

</div>

<script>
// Load sidebar
fetch('sidebar.html')
.then(res=>res.text())
.then(html=>{ document.getElementById('sidebar-placeholder').innerHTML=html; });

fetch('header.html')
.then(res=>res.text())
.then(html=>{ const ph = document.getElementById('header-placeholder'); ph.innerHTML = html; ph.querySelectorAll('script').forEach(s=>{ const ns = document.createElement('script'); if(s.src) ns.src = s.src; else ns.textContent = s.textContent; document.body.appendChild(ns); document.body.removeChild(ns); }); });

// Load routes with correct sequence
async function loadRoutes(){
    const res = await fetch("https://acceptable-solace-production-06f3.up.railway.app/get_routes");
    const data = await res.json();
    const table = document.getElementById("routesTable");
    table.innerHTML="";

    data.forEach((route,index)=>{
        const row = document.createElement("tr");
        row.innerHTML=`
        <td>${route.id}</td>
        <td>${route.start_point}</td>
        <td>${route.end_point}</td>
        <td>
            <button class="manage-btn" onclick="manageStops(${route.id})">Manage Stops</button>
        </td>
        <td>
            <button class="icon-btn" title="Edit" onclick="updateRoute(${route.id}, '${route.start_point}', '${route.end_point}')">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
            <button class="icon-btn" title="Delete" onclick="deleteRoute(${route.id})">
                <i class="fa-solid fa-trash"></i>
            </button>
        </td>
        `;
        table.appendChild(row);
    });
}

// Manage Stops
function manageStops(routeId){
    window.location.href=`route-stops.html?route_id=${routeId}`;
}

// Delete route
function deleteRoute(id){
    if(!confirm("Delete this route?")) return;
    fetch(`https://acceptable-solace-production-06f3.up.railway.app/delete_route/${id}`,{method:"DELETE"})
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        loadRoutes();
    });
}

// Update route
function updateRoute(id, oldStart, oldEnd){
    const newStart = prompt("Enter new Start Point:", oldStart);
    if(newStart === null) return;
    const newEnd = prompt("Enter new End Point:", oldEnd);
    if(newEnd === null) return;

    fetch(`https://acceptable-solace-production-06f3.up.railway.app/update_route/${id}`,{
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({start_point: newStart.trim(), end_point: newEnd.trim()})
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        loadRoutes();
    })
    .catch(err=>console.error(err));
}

// Load page
document.addEventListener("DOMContentLoaded",loadRoutes);
</script>

</body>
</html>
