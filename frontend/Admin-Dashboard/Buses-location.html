<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Live Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root {
  font-family: 'Poppins', sans-serif;
}
body {
  margin: 0;
  background: #eef2ff;
}
.page {
  display: flex;
  min-height: 100vh;
}
.sidebar {
  width: 300px;
  background: #111827;
  color: #e2e8f0;
  padding: 28px 22px;
  box-shadow: 2px 0 24px rgba(15, 23, 42, 0.16);
  display: flex;
  flex-direction: column;
}
.sidebar .title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}
.sidebar .subtitle {
  font-size: 13px;
  line-height: 1.6;
  color: #94a3b8;
  margin-bottom: 22px;
}
.sidebar .stats {
  margin-bottom: 20px;
}
.sidebar .stats .card {
  background: #1f2937;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 4px 12px rgba(15, 23, 42, 0.12);
}
.sidebar .stats .card strong {
  display: block;
  color: #cbd5e1;
  font-size: 12px;
  margin-bottom: 4px;
}
.sidebar .stats .card span {
  display: block;
  color: #f8fafc;
  font-size: 20px;
  font-weight: 700;
}
.sidebar .bus-list {
  flex: 1;
  overflow-y: auto;
}
.bus-card {
  background: #1f2937;
  border-radius: 18px;
  padding: 16px 18px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.bus-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
}
.bus-card .bus-id {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
  color: #f8fafc;
}
.bus-card .status {
  display: inline-flex;
  padding: 5px 11px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}
.bus-card .status.online {
  color: #16a34a;
  background: rgba(22, 163, 74, 0.12);
}
.bus-card .status.offline {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.12);
}
.bus-card .stop-line {
  color: #cbd5e1;
  font-size: 13px;
  margin-top: 8px;
}
.sidebar .bus-list .empty {
  background: rgba(255, 255, 255, 0.06);
  border: 1px dashed rgba(148, 163, 184, 0.35);
  border-radius: 18px;
  color: #cbd5e1;
  padding: 18px;
  font-size: 14px;
}
.live-buses .bus-item {
  background: #1f2937;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}
.live-buses .bus-item .bus-num {
  font-weight: 700;
  color: #f8fafc;
  margin-bottom: 5px;
}
.live-buses .bus-item .stops {
  font-size: 12px;
  color: #cbd5e1;
  margin-bottom: 5px;
}
.live-buses .bus-item .route-stops {
  font-size: 11px;
  color: #94a3b8;
  max-height: 80px;
  overflow-y: auto;
}
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.header {
  padding: 10px 20px;
  background: #2563eb;
  color: white;
}
.header h1 {
  margin: 0;
  font-size: 20px;
}
#map {
  flex: 1;
  min-height: 100vh;
}
</style>
</head>

<body>
<div class="page">
  <div class="sidebar">
    <button class="button secondary" onclick="window.location.href='admin.html'" style="margin-bottom: 20px;">← Back to Dashboard</button>
    <div class="title">🚍 Bus Tracker</div>
    <div class="subtitle">All buses with drivers, live status.</div>
    <div class="stats">
      <div class="card"><strong>Live Buses</strong><span id="onlineCount">0</span></div>
      <div class="card"><strong>Offline Buses</strong><span id="offlineCount">0</span></div>
      <div class="card"><strong>Last Refresh</strong><span id="lastUpdated">--:--:--</span></div>
    </div>
    <div class="live-buses" id="liveBusesList">
      <div class="title" style="font-size: 16px; margin-bottom: 10px;">Live Buses</div>
    </div>
    <div class="bus-list" id="busList"></div>
  </div>
  <div class="main">
    <div class="header">
      <h1>Tracking Buses</h1>
    </div>
    <div id="map"></div>
  </div>
</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const API_URL = "https://acceptable-solace-production-06f3.up.railway.app";
let map = L.map('map').setView([30.1575, 71.5249], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
let markers = {};
let polylines = {};
let selectedBusId = null;

function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function formatTime(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function setSelectedBus(busId, label, status, currentStop, lat, lng) {
  document.getElementById('busId').innerText = label || '-';
  document.getElementById('status').innerText = status || '-';
  document.getElementById('currentPos').innerText = currentStop || '-';
  selectedBusId = String(busId);
}

function loadAll() {
  // Fetch all buses with drivers
  fetch(`${API_URL}/get_buses`)
    .then(res => res.json())
    .then(buses => {
      // Filter buses that have drivers
      const busesWithDrivers = buses.filter(bus => bus.driver_id);

      // Fetch locations
      fetch(`${API_URL}/get_all_locations`)
        .then(res => res.json())
        .then(locations => {
          const busList = document.getElementById('busList');
          const onlineCountEl = document.getElementById('onlineCount');
          const offlineCountEl = document.getElementById('offlineCount');
          const lastUpdatedEl = document.getElementById('lastUpdated');
          busList.innerHTML = '';

          const liveList = document.getElementById('liveBusesList');
          liveList.innerHTML = '<div class="title" style="font-size: 16px; margin-bottom: 10px;">Live Buses</div>';

          // Clear markers and polylines
          Object.keys(markers).forEach(key => {
            map.removeLayer(markers[key]);
          });
          Object.keys(polylines).forEach(key => {
            map.removeLayer(polylines[key]);
          });
          markers = {};
          polylines = {};

          let onlineCount = 0;
          let offlineCount = 0;
          const allBuses = [];

          busesWithDrivers.forEach(bus => {
            const location = locations.find(loc => loc.bus_id === bus.id);
            let status = 'OFFLINE';
            let lat = null;
            let lng = null;
            let currentStop = '-';

            if (location) {
              const diff = (Date.now() - new Date(location.last_updated + ' UTC').getTime()) / 1000;
              if (diff < 60) {
                status = 'ONLINE';
                lat = parseFloat(location.latitude);
                lng = parseFloat(location.longitude);
                onlineCount++;
              } else {
                offlineCount++;
              }
            } else {
              offlineCount++;
            }

            allBuses.push({ bus, status, lat, lng, currentStop });

            const busLabel = bus.bus_number ? `Bus ${bus.bus_number}` : `Bus ${bus.id}`;

            const card = document.createElement('div');
            card.className = 'bus-card';
            card.innerHTML = `
              <div class="bus-id">🚍 ${busLabel}</div>
              <div class="status ${status.toLowerCase()}">${status}</div>
              <div class="stop-line">Current: -</div>
              <div class="stop-line">Next: -</div>
            `;

            card.addEventListener('click', () => {
              setSelectedBus(bus.id, busLabel, status, currentStop, lat, lng);
              if (lat && lng) {
                map.setView([lat, lng], 13, { animate: true });
                if (markers[bus.id]) {
                  markers[bus.id].openPopup();
                }
              }
            });

            busList.appendChild(card);

            if (status === 'ONLINE' && lat && lng) {
              markers[bus.id] = L.marker([lat, lng])
                .addTo(map)
                .bindPopup(`🚍 ${busLabel}`);

              // Draw route path
              if (bus.route_id) {
                fetch(`${API_URL}/get_stops/${bus.route_id}`)
                  .then(r => r.json())
                  .then(stops => {
                    if (stops && stops.length > 0) {
                      stops.sort((a, b) => (a.stop_order || 0) - (b.stop_order || 0));
                      const latlngs = stops.map(stop => [parseFloat(stop.latitude), parseFloat(stop.longitude)]).filter(([lat, lng]) => !isNaN(lat) && !isNaN(lng));
                      if (latlngs.length > 1) {
                        polylines[bus.id] = L.polyline(latlngs, { color: 'blue', weight: 4, opacity: 0.7 }).addTo(map);
                      }

                      // Calculate current stop
                      const stopsWithDistance = stops.map(stop => {
                        const stopLat = parseFloat(stop.latitude);
                        const stopLng = parseFloat(stop.longitude);
                        return {
                          ...stop,
                          distance: isNaN(stopLat) || isNaN(stopLng) ? Infinity : calculateDistance(lat, lng, stopLat, stopLng)
                        };
                      });
                      const nearestStop = stopsWithDistance.reduce((prev, curr) => curr.distance < prev.distance ? curr : prev);
                      if (nearestStop.distance !== Infinity) {
                        currentStop = nearestStop.stop_name;
                        card.querySelectorAll('.stop-line')[0].innerText = `Current: ${nearestStop.stop_name}`;
                        const nextIdx = stopsWithDistance.findIndex(s => s.id === nearestStop.id) + 1;
                        const nextStop = nextIdx < stopsWithDistance.length ? stopsWithDistance[nextIdx] : null;
                        card.querySelectorAll('.stop-line')[1].innerText = `Next: ${nextStop ? nextStop.stop_name : 'End'}`;

                        // Add to live list
                        const liveItem = document.createElement('div');
                        liveItem.className = 'bus-item';
                        liveItem.innerHTML = `
                          <div class="bus-num">${busLabel}</div>
                          <div class="stops">Current: ${currentStop}, Next: ${nextStop ? nextStop.stop_name : 'End'}</div>
                          <div class="route-stops">Route: ${stops.map(s => s.stop_name).join(' → ')}</div>
                        `;
                        liveList.appendChild(liveItem);
                      }
                    }
                  });
              }
            }
          });

          if (allBuses.length === 0) {
            busList.innerHTML = '<div class="empty">No buses with drivers assigned.</div>';
            setSelectedBus('-', '-', '-', '-', null, null);
          } else if (!selectedBusId || !allBuses.find(b => String(b.bus.id) === selectedBusId)) {
            const first = allBuses[0];
            const firstLabel = first.bus.bus_number ? `Bus ${first.bus.bus_number}` : `Bus ${first.bus.id}`;
            setSelectedBus(first.bus.id, firstLabel, first.status, first.currentStop, first.lat, first.lng);
            if (first.lat && first.lng) {
              map.setView([first.lat, first.lng], 13);
            }
          }

          onlineCountEl.innerText = onlineCount;
          offlineCountEl.innerText = offlineCount;
          lastUpdatedEl.innerText = formatTime(new Date());
        });
    })
    .catch(err => {
      console.error('Load error:', err);
    });
}

setInterval(loadAll, 5000);
loadAll();
</script>
</body>
</html>
