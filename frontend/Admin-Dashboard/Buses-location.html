<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Tracking (Latest Only)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Poppins;
background:#f4f6fb;
}

h1{
padding:15px;
color:#1e3a8a;
}

#map{
height:90vh;
width:100%;
}
</style>
</head>

<body>

<h1>🚍 Live Shuttle Tracking</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_URL = "https://acceptable-solace-production-06f3.up.railway.app";

let map = L.map('map').setView([30.1575,71.5249], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let markers = {};

// ===============================
// ONLY LATEST LOCATION PER BUS
// ===============================
function loadAllLocations(){

fetch(`${API_URL}/get_all_locations`)
.then(res => res.json())
.then(data => {

console.log("RAW DATA:", data);

// STEP 1: keep latest per bus
let latest = {};

data.forEach(item => {

let id = item.bus_id;

let time = item.last_updated ? new Date(item.last_updated).getTime() : 0;

// keep ONLY latest record
if(!latest[id] || time > latest[id].time){
latest[id] = {
data: item,
time: time
};
}

});

// STEP 2: render map
Object.keys(latest).forEach(id => {

let bus = latest[id].data;

let lat = parseFloat(bus.latitude);
let lng = parseFloat(bus.longitude);

if(isNaN(lat) || isNaN(lng)) return;

// marker update
if(markers[id]){
markers[id].setLatLng([lat,lng]);
}
else{
markers[id] = L.marker([lat,lng])
.addTo(map)
.bindPopup(`
<b>🚍 Bus:</b> ${id}<br>
<b>Status:</b> LIVE
`);
}

});

})
.catch(err=>{
console.log("ERROR:", err);
});

}

// start
loadAllLocations();
setInterval(loadAllLocations, 4000);

</script>

</body>
</html>
