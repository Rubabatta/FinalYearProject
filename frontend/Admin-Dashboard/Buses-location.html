```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Buses Live Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Poppins;
background:#f4f6fb;
}

h1{
padding:20px;
color:#1e3a8a;
}

#map{
height:90vh;
width:100%;
}

</style>
</head>

<body>

<h1>Live Shuttle Tracking</h1>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_URL =
"https://acceptable-solace-production-06f3.up.railway.app";

let map = L.map('map').setView([30.1575,71.5249], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let markers = {};

function loadAllLocations(){

fetch(`${API_URL}/get_all_locations`)
.then(res => res.json())
.then(data => {

console.log("ALL LOCATIONS:", data);

data.forEach(bus => {

let lat = parseFloat(bus.latitude);
let lng = parseFloat(bus.longitude);

if(isNaN(lat) || isNaN(lng)) return;

if(markers[bus.bus_id]){

markers[bus.bus_id].setLatLng([lat,lng]);

}else{

markers[bus.bus_id] = L.marker([lat,lng])
.addTo(map)
.bindPopup(`
<b>Bus ID:</b> ${bus.bus_id}<br>
<b>Last Update:</b> ${bus.last_updated}
`);

}

});

})
.catch(err => {
console.log("ERROR:", err);
});

}

loadAllLocations();

setInterval(loadAllLocations,5000);

</script>

</body>
</html>
```
