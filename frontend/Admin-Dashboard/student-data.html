<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}
.main{margin-left:240px;width:100%;padding:30px;}
h1{color:#1e3a8a;margin-bottom:20px;}

.table-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
}

.search-box input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.search-box button{
padding:8px 12px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.add-btn{
padding:8px 14px;
background:#10b981;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

table{width:100%;border-collapse:collapse;}
table th{background:#3b82f6;color:white;padding:10px;text-align:left;}
table td{padding:10px;border-bottom:1px solid #eee;}
table tr:hover{background:#f1f5ff;}

/* image box */
td img{
width:45px;
height:45px;
border-radius:8px;
object-fit:cover;
border:1px solid #ddd;
}

/* buttons */
.btn-action{
padding:5px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:3px;
font-size:14px;
}
.btn-update{background:#f59e0b;color:white;}
.btn-delete{background:#ef4444;color:white;}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>

<div class="main">

<h1>Students Details</h1>

<div class="table-box">

<div class="top-bar">

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search student by ID or Name...">
<button onclick="searchStudent()">Search</button>
</div>

<button class="add-btn" onclick="window.location.href='add-student.html'">
<i class="fa fa-plus"></i> Add Student
</button>

</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Image</th>
<th>Name</th>
<th>Email</th>
<th>Student ID</th>
<th>Center</th>
<th>Contact</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>

</div>
</div>

<script>

/* sidebar */
fetch('sidebar.html')
.then(res => res.text())
.then(html=>{
document.getElementById('sidebar-placeholder').innerHTML = html;
});

/* data */
let studentsData=[];

/* load */
function loadStudents(){

fetch('http://127.0.0.1:5000/get_students')
.then(res=>res.json())
.then(data=>{
studentsData=data;
renderTable(data);
})
.catch(err=>console.log("API ERROR:",err));

}

/* render */
function renderTable(data){

let rows="";

data.forEach(student=>{

// SAFE IMAGE FIX
let img = student.image
? `http://127.0.0.1:5000${student.image}?t=${Date.now()}`
: "https://via.placeholder.com/45";

rows+=`
<tr>
<td>${student.id}</td>

<td>
<img src="${img}">
</td>

<td>${student.name}</td>
<td>${student.email}</td>
<td>${student.studentID || "-"}</td>
<td>${student.center || "-"}</td>
<td>${student.contact || "-"}</td>

<td>
<button class="btn-action btn-update" onclick="updateStudent(${student.id})">
<i class="fa fa-pencil"></i>
</button>

<button class="btn-action btn-delete" onclick="deleteStudent(${student.id})">
<i class="fa fa-trash"></i>
</button>
</td>

</tr>
`;

});

document.getElementById("studentsTable").innerHTML=rows;
}

/* search */
function searchStudent(){

let keyword=document.getElementById("searchInput").value.toLowerCase().trim();

if(keyword===""){
renderTable(studentsData);
return;
}

let filtered=studentsData.filter(s=>
(String(s.name||"").toLowerCase().includes(keyword) ||
String(s.email||"").toLowerCase().includes(keyword) ||
String(s.studentID||"").toLowerCase().includes(keyword) ||
String(s.id||"").includes(keyword))
);

renderTable(filtered);
}

/* enter search */
document.getElementById("searchInput").addEventListener("keypress",function(e){
if(e.key==="Enter") searchStudent();
});

/* delete */
function deleteStudent(id){
if(confirm("Are you sure?")){
fetch(`http://127.0.0.1:5000/delete_student/${id}`,{method:'DELETE'})
.then(res=>res.json())
.then(data=>{
alert(data.message);
loadStudents();
});
}
}

/* update */
function updateStudent(id){
window.location.href=`update-student.html?id=${id}`;
}

document.addEventListener("DOMContentLoaded",loadStudents);

</script>

</body>
</html>
