<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}
.main{margin-left:210px;width:100%;padding:30px;}
h1{color:#1e3a8a;margin-bottom:20px;}

.page-header{
display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
margin-bottom:20px;
}

.page-header h1{
margin-bottom:0;
}

.table-box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.top-bar{
display:flex;
justify-content:flex-start;
margin-bottom:15px;
}

.search-box input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.search-box button{
padding:8px 12px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.add-btn{
padding:8px 14px;
background:#10b981;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

table{width:100%;border-collapse:collapse;}
table th{background:#3b82f6;color:white;padding:10px;text-align:left;}
table td{padding:10px;border-bottom:1px solid #eee;}
table tr:hover{background:#f1f5ff;}

/* image box */
td img{
width:45px;
height:45px;
border-radius:8px;
object-fit:cover;
border:1px solid #ddd;
}

/* buttons */
.icon-btn{border:none;border-radius:10px;cursor:pointer;margin-right:6px;color:white;font-size:12px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:0.3s;}
.icon-btn:hover{transform:scale(1.08);}
.icon-btn.edit{background:#f59e0b;}
.icon-btn.delete{background:#ef4444;}

td:last-child{display:flex;align-items:center;gap:6px;white-space:nowrap;}

/* modal */
/* ===== MODAL BACKDROP ===== */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(15,23,42,0.7);
backdrop-filter:blur(6px);
z-index:1000;
align-items:center;
justify-content:center;
padding:20px;
}

/* ===== MODAL BOX ===== */
.modal-content{
background:#ffffff;
border-radius:18px;
max-width:750px;
width:100%;
padding:25px;

box-shadow:0 25px 60px rgba(0,0,0,0.25);
position:relative;

animation:pop 0.25s ease-in-out;
}

@keyframes pop{
from{transform:scale(0.9); opacity:0;}
to{transform:scale(1); opacity:1;}
}

/* CLOSE BUTTON */
.close-btn{
position:absolute;
top:12px;
right:16px;
font-size:26px;
color:#64748b;
cursor:pointer;
transition:0.2s;
}
.close-btn:hover{
color:#ef4444;
}

/* TITLE */
.modal-header h2{
font-size:20px;
color:#1e3a8a;
margin-bottom:18px;
border-bottom:1px solid #e2e8f0;
padding-bottom:10px;
}

/* ===== PROFILE LAYOUT ===== */
.profile-grid{
display:flex;
gap:20px;
align-items:flex-start;
}

/* IMAGE */
.profile-card img{
width:130px;
height:130px;
border-radius:16px;
object-fit:cover;
border:2px solid #e2e8f0;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

/* INFO BOX */
.profile-info{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* EACH TEXT BOX */
.profile-info p{
background:#f8fafc;
padding:10px 12px;
border-radius:10px;
border:1px solid #eef2ff;

font-size:13px;
color:#334155;

display:flex;
justify-content:space-between;
align-items:center;

transition:0.2s;
}

.profile-info p:hover{
background:#eef2ff;
transform:translateY(-1px);
}

/* LABEL */
.profile-info p strong{
color:#1e3a8a;
font-weight:600;
}

/* ===== FOOTER BUTTONS ===== */
.modal-footer{
margin-top:20px;
display:flex;
justify-content:flex-end;
gap:10px;
}

.modal-footer button{
padding:10px 16px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

/* BUTTON STYLES */
.add-btn{
background:#10b981;
color:white;
}

.add-btn:hover{
background:#059669;
transform:translateY(-2px);
}

.danger-btn{
background:#ef4444;
color:white;
}

.danger-btn:hover{
background:#dc2626;
transform:translateY(-2px);
}
</style>
</head>

<body>

<div id="sidebar-placeholder"></div>
<div id="header-placeholder"></div>

<div class="main">

<div class="page-header">
<h1>Students Details</h1>
<button class="add-btn" onclick="window.location.href='add-student.html'">
<i class="fa fa-plus"></i> Add Student
</button>
</div>
<div id="summary"></div>

<div class="table-box">

<div class="top-bar">

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search by Reg. No, Name, Department, Section, Program or Route...">
<button onclick="searchStudent()">Search</button>
</div>

</div>

<table>
<thead>
<tr>
<th>Reg. No</th>
<th>Name</th>
<th>Department</th>
<th>Section</th>
<th>Route</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="studentsTable"></tbody>
</table>

</div>
</div>

<div id="detailModal" class="modal" onclick="if(event.target===this) closeModal();">
<div class="modal-content">
<span class="close-btn" onclick="closeModal()">&times;</span>
<div class="modal-header"><h2>Student Profile</h2></div>
<div class="modal-body" id="modalBody"></div>
<div class="modal-footer">
<button type="button" class="danger-btn" id="deleteProfileBtn">Delete Student</button>
<button type="button" class="add-btn" id="editProfileBtn">Edit Student</button>
</div>
</div>
</div>

<script>

/* sidebar */
fetch('sidebar.html')
.then(res => res.text())
.then(html=>{
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

fetch('header.html')
.then(res => res.text())
.then(html=>{
    const ph = document.getElementById('header-placeholder');
    ph.innerHTML = html;
    ph.querySelectorAll('script').forEach(s=>{
        const ns = document.createElement('script');
        if(s.src) ns.src = s.src; else ns.textContent = s.textContent;
        document.body.appendChild(ns);
        document.body.removeChild(ns);
    });
});

/* data */
let studentsData=[];
let routesData = [];
let stopsData = {};

/* load */
async function loadStudents(){
    try{
        // Load students first
        const studentsRes = await fetch('https://acceptable-solace-production-06f3.up.railway.app/get_students');
        studentsData = await studentsRes.json();
        console.log("Students loaded:", studentsData);

        // Load routes
        const routesRes = await fetch('https://acceptable-solace-production-06f3.up.railway.app/get_routes');
        routesData = await routesRes.json();
        console.log("Routes loaded:", routesData);

        // Load all stops for all routes
        for(let route of routesData){
            try{
                const stopsRes = await fetch(`https://acceptable-solace-production-06f3.up.railway.app/get_stops/${route.id}`);
                const stops = await stopsRes.json();
                stopsData[route.id] = stops;
                console.log(`Stops for route ${route.id}:`, stops);
            }catch(err){
                console.error(`Error loading stops for route ${route.id}:`, err);
                stopsData[route.id] = [];
            }
        }

        console.log("All stops data:", stopsData);
        renderTable(studentsData);
    }catch(err){
        console.log("API ERROR:", err);
        alert("Error loading students data");
    }
}

/* render */
function renderTable(data, keyword=""){

let rows="";

data.forEach(student=>{

// SAFE IMAGE FIX
let img = student.image && student.image.trim() !== ""
? `https://acceptable-solace-production-06f3.up.railway.app${student.image}?t=${Date.now()}`
: "https://i.imgur.com/6VBx3io.png";

// Get route name
let routeName = "-";
let routeId = Number(student.route_id) || student.route_id;
if(routeId){
    const route = routesData.find(r => Number(r.id) === routeId || r.id === student.route_id);
    if(route) {
        routeName = `${route.start_point} → ${route.end_point}`;
        console.log(`Student ${student.id}: Route found -`, routeName);
    } else {
        console.log(`Student ${student.id}: Route NOT found. Looking for route_id: ${routeId}, Available: ${routesData.map(r => r.id).join(', ')}`);
    }
}

// Get stop name
let stopName = "-";
let stopId = Number(student.stop_id) || student.stop_id;
if(stopId && routeId){
    const routeStops = stopsData[routeId] || stopsData[Number(routeId)];
    if(routeStops && Array.isArray(routeStops)){
        const stop = routeStops.find(s => Number(s.id) === stopId || s.id === student.stop_id);
        if(stop) {
            stopName = stop.stop_name;
            console.log(`Student ${student.id}: Stop found -`, stopName);
        } else {
            console.log(`Student ${student.id}: Stop NOT found. Looking for stop_id: ${stopId}`);
        }
    } else {
        console.log(`Student ${student.id}: No stops data for route ${routeId}`);
    }
}

rows+=`
<tr>
<td>${student.studentID || "-"}</td>
<td>${student.name || "-"}</td>
<td>${student.department || "-"}</td><td>${student.section || "-"}</td><td>${routeName}</td>
<td>
<button class="icon-btn edit" title="View Details" onclick="viewStudent(${student.id})">
<i class="fa fa-eye"></i>
</button>
</td>
</tr>
`;

});

document.getElementById("studentsTable").innerHTML=rows;

const summaryEl = document.getElementById("summary");
if(summaryEl){
    if(keyword){
        const total = data.length;
        summaryEl.innerText = `Found ${total} student${total===1 ? '' : 's'} for "${keyword}".`;
    } else {
        summaryEl.innerText = "";
    }
}
}

/* search */
function getRouteName(student){
    const routeId = Number(student.route_id) || student.route_id;
    if(!routeId) return "-";
    const route = routesData.find(r => Number(r.id) === routeId || r.id === student.route_id);
    return route ? `${route.start_point} → ${route.end_point}` : "-";
}

function getStopName(student){
    const routeId = Number(student.route_id) || student.route_id;
    const stopId = Number(student.stop_id) || student.stop_id;
    if(!routeId || !stopId) return "-";
    const routeStops = stopsData[routeId] || stopsData[Number(routeId)];
    if(!Array.isArray(routeStops)) return "-";
    const stop = routeStops.find(s => Number(s.id) === stopId || s.id === student.stop_id);
    return stop ? stop.stop_name : "-";
}

function searchStudent(){
    let keyword=document.getElementById("searchInput").value.toLowerCase().trim();
    if(keyword===""){
        renderTable(studentsData);
        return;
    }

    // Check for exact department match
    const deptMatch = studentsData.filter(s => String(s.department||"").toLowerCase() === keyword);
    if(deptMatch.length > 0){
        renderTable(deptMatch, keyword);
        return;
    }

    // Check for exact program match
    const progMatch = studentsData.filter(s => String(s.program||"").toLowerCase() === keyword);
    if(progMatch.length > 0){
        renderTable(progMatch, keyword);
        return;
    }

    // Check for exact section match
    const sectMatch = studentsData.filter(s => String(s.section||"").toLowerCase() === keyword);
    if(sectMatch.length > 0){
        renderTable(sectMatch, keyword);
        return;
    }

    // Fallback to general search
    let filtered=studentsData.filter(s=>{
        const routeName = getRouteName(s).toLowerCase();
        return (
            String(s.name||"").toLowerCase().includes(keyword) ||
            String(s.studentID||"").toLowerCase().includes(keyword) ||
            String(s.department||"").toLowerCase().includes(keyword) ||
            String(s.section||"").toLowerCase().includes(keyword) ||
            String(s.program||"").toLowerCase().includes(keyword) ||
            routeName.includes(keyword)
        );
    });

    renderTable(filtered, keyword);
}

/* enter search */
document.getElementById("searchInput").addEventListener("keypress",function(e){
if(e.key==="Enter") searchStudent();
});

/* delete */
function deleteStudent(id){
if(confirm("Are you sure?")){
fetch(`https://acceptable-solace-production-06f3.up.railway.app/delete_student/${id}`,{method:'DELETE'})
.then(res=>res.json())
.then(data=>{
alert(data.message);
loadStudents();
});
}
}

/* update */
function viewStudent(id){
    fetch(`https://acceptable-solace-production-06f3.up.railway.app/get_student/${id}`)
    .then(res => res.json())
    .then(student => {
        if(!student) return;
        const img = student.image && student.image.trim() !== ""
            ? `https://acceptable-solace-production-06f3.up.railway.app${student.image}?t=${Date.now()}`
            : "https://i.imgur.com/6VBx3io.png";
        const routeName = getRouteName(student);
        const stopName = getStopName(student);

        document.getElementById('modalBody').innerHTML = `
            <div class="profile-grid">
                <div class="profile-card">
                    <img src="${img}" alt="Student Photo">
                </div>
                <div class="profile-info">
                    <p><strong>Reg. No:</strong> ${student.studentID || "-"}</p>
                    <p><strong>Name:</strong> ${student.name || "-"}</p>
                    <p><strong>Email:</strong> ${student.email || "-"}</p>
                    <p><strong>Department:</strong> ${student.department || "-"}</p>
                    <p><strong>Program:</strong> ${student.program || "-"}</p>
                    <p><strong>Section:</strong> ${student.section || "-"}</p>
                    <p><strong>Contact:</strong> ${student.contact || "-"}</p>
                    <p><strong>Route:</strong> ${routeName}</p>
                    <p><strong>Stop:</strong> ${stopName}</p>
                </div>
            </div>
        `;
        const editBtn = document.getElementById('editProfileBtn');
        const deleteBtn = document.getElementById('deleteProfileBtn');
        editBtn.onclick = () => window.location.href = `update-student.html?id=${id}`;
        deleteBtn.onclick = () => {
            if(confirm('Delete this student record?')){
                deleteStudent(id);
                closeModal();
            }
        };
        document.getElementById('detailModal').style.display = 'flex';
    })
    .catch(err => {
        console.error("Error fetching student:", err);
        alert("Error loading student details");
    });
}

function closeModal(){
    document.getElementById('detailModal').style.display = 'none';
}

document.addEventListener("DOMContentLoaded",loadStudents);

</script>

</body>
</html>
