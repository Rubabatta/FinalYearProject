<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drivers Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#dbeafe,#eef2ff 40%),
    radial-gradient(circle at bottom right,#bfdbfe,#eef2ff 45%);
    min-height:100vh;
    overflow-x:hidden;
}

/* SIDEBAR */

#sidebar{
    position:fixed;
    left:0;
    top:0;
    bottom:0;
    width:240px;
    z-index:100;
}

/* MAIN */

.main{
    margin-left:240px;
    width:calc(100% - 240px);
    padding:35px 30px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    gap:24px;
    align-items:center;
}

/* TITLE */

h1{
    color:#1e3a8a;
    margin-bottom:10px;
    font-size:34px;
    font-weight:700;
}

/* BOX */

.box{
    background:white;
    padding:24px;
    border-radius:20px;
    box-shadow:0 18px 40px rgba(15,23,42,0.08);
    width:100%;
    max-width:950px;
    overflow-x:auto;
}

/* ADD BUTTON */

.add-btn{
    padding:12px 18px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    border:none;
    color:white;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:20px;
    font-weight:600;
    font-size:14px;
    transition:0.3s;
    box-shadow:0 10px 24px rgba(37,99,235,0.18);
}

.add-btn:hover{
    transform:translateY(-2px);
    background:linear-gradient(135deg,#1d4ed8,#1e40af);
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    min-width:850px;
}

/* TABLE HEAD */

th{
    background:#2563eb;
    color:white;
    padding:14px;
    text-align:left;
    font-size:14px;
    font-weight:600;
}

/* TABLE DATA */

td{
    padding:14px;
    border-bottom:1px solid #edf2f7;
    color:#334155;
    font-size:14px;
}

/* ROW HOVER */

tr{
    transition:0.2s;
}

tr:hover{
    background:#f8fbff;
}

/* ACTION BUTTONS */

.icon-btn{
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-right:6px;
    color:white;
    font-size:12px;
    width:32px;
    height:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.3s;
}

.icon-btn:hover{
    transform:scale(1.08);
}

.edit{
    background:#f59e0b;
}

.delete{
    background:#ef4444;
}

/* MODAL */

/* ===== MODAL BACKDROP ===== */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(15,23,42,0.65);
    backdrop-filter:blur(6px);
    justify-content:center;
    align-items:center;
    z-index:999;
    padding:20px;
}

/* ===== MODAL CARD ===== */
.modal-content{
    background:#ffffff;
    width:100%;
    max-width:600px;
    border-radius:20px;
    padding:25px;
    box-shadow:0 25px 60px rgba(0,0,0,0.25);
    position:relative;
    animation:pop 0.25s ease;
}

/* ANIMATION */
@keyframes pop{
    from{transform:scale(0.92); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* CLOSE BUTTON */
.close-btn{
    position:absolute;
    right:18px;
    top:14px;
    font-size:26px;
    cursor:pointer;
    color:#64748b;
    transition:0.2s;
}
.close-btn:hover{
    color:#ef4444;
    transform:scale(1.1);
}

/* HEADER */
.modal-header h2{
    font-size:20px;
    color:#1e3a8a;
    font-weight:700;
    margin-bottom:15px;
    text-align:center;
}

/* ===== PROFILE LAYOUT ===== */

/* INFO AREA */
.profile-info{
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* EACH ROW (CLEAN CARD STYLE) */
.profile-info p{
    display:flex;
    justify-content:space-between;   /* 👈 YOUR REQUEST */
    align-items:center;
    background:#f8fafc;
    padding:8px 12px;
    border-radius:10px;
    font-size:13px;
    color:#334155;
    border:1px solid #eef2ff;
}

/* LABEL */
.profile-info p strong{
    color:#1e3a8a;
    font-weight:600;
}

/* FOOTER BUTTONS */
.modal-footer{
    margin-top:18px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.modal-footer button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

/* BUTTON COLORS */
.add-btn{
    background:#2563eb;
    color:white;
}
.add-btn:hover{
    background:#1d4ed8;
}

.danger-btn{
    background:#ef4444;
    color:white;
}
.danger-btn:hover{
    background:#dc2626;
}

/* MOBILE */
@media(max-width:600px){
    .profile-grid{
        flex-direction:column;
        align-items:center;
        text-align:center;
    }

    .profile-info p{
        justify-content:space-between;
    }
}

/* POPUP ANIMATION */

@keyframes popup{

    from{
        opacity:0;
        transform:scale(0.9);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

/* FORM TOP */

.form-top{
    text-align:center;
    margin-bottom:14px;
}

/* ICON */

.form-icon{
    width:46px;
    height:46px;
    border-radius:14px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    color:white;
    font-size:18px;
    margin-bottom:10px;
}

/* FORM TITLE */

.form-top h1{
    color:#1e3a8a;
    font-size:18px;
    margin-bottom:3px;
    font-weight:700;
}

/* FORM TEXT */

.form-top p{
    color:#64748b;
    font-size:11px;
}

/* INPUTS */

.modal-content input,
.modal-content select{
    width:100%;
    padding:10px 12px;
    margin:8px 0;
    border:1.5px solid #dbe3f0;
    border-radius:10px;
    background:#f8fafc;
    color:#0f172a;
    font-size:12px;
    outline:none;
    transition:0.3s;
}

/* INPUT FOCUS */

.modal-content input:focus,
.modal-content select:focus{
    background:white;
    border-color:#3b82f6;
    box-shadow:0 0 0 4px rgba(59,130,246,0.10);
}

/* BUTTONS */

.modal-content button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    margin-top:8px;
    transition:0.3s;
}

.modal-content button:hover{
    transform:translateY(-2px);
}

.modal-content button:last-of-type{
    background:#64748b;
}

/* ROUTE TEXT */

#route_show{
    font-size:12px;
    color:#2563eb;
    margin-top:6px;
    font-weight:600;
}
/* YE CSS ADD KARO */

td:last-child{
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
}

/* OPTIONAL - buttons aur clean lagen gy */

.icon-btn{
    flex-shrink:0;
}
/* MOBILE */

@media(max-width:768px){

    #sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
        width:100%;
        padding:20px;
    }

    h1{
        font-size:28px;
    }

    .box{
        padding:18px;
    }
}

</style>
</head>

<body>

<div id="sidebar"></div>

<div class="main">

<h1>Drivers Management</h1>

<div class="box">

<button class="add-btn" onclick="openModal()">
<i class="fa fa-plus"></i> Add Driver
</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Bus Number</th>
<th>Route</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<div class="form-top">
    <div class="form-icon">
        <i class="fa-solid fa-user-plus"></i>
    </div>
    <h1 id="modalTitle">Add Driver</h1>
    <p>Enter driver details</p>
</div>

<input type="hidden" id="id">
<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="text" id="contact" placeholder="Contact" pattern="[0-9]{11}" minlength="11" maxlength="11" inputmode="numeric">
<select id="bus_id"></select>
<p id="route_show"></p>
<button type="button" onclick="save()">Save</button>
<button type="button" onclick="closeModal()">Close</button>

</div>
</div>

<!-- DETAILS MODAL -->
<div class="modal" id="detailModal" onclick="if(event.target===this) closeDetailModal();">
<div class="modal-content">
<span class="close-btn" onclick="closeDetailModal()">&times;</span>
<div class="modal-header"><h2>Driver Profile</h2></div>
<div class="modal-body" id="modalBody"></div>
<div class="modal-footer">
<button type="button" class="danger-btn" id="deleteProfileBtn">Delete Driver</button>
<button type="button" class="add-btn" id="editProfileBtn">Edit Driver</button>
</div>
</div>
</div>

<script>

const API = "https://acceptable-solace-production-06f3.up.railway.app";

/* SIDEBAR */
fetch("sidebar.html")
.then(r=>r.text())
.then(d=>{
    document.getElementById("sidebar").innerHTML=d;
});

/* OPEN MODAL */
function openModal(){
    document.getElementById("modalTitle").innerText = "Add Driver";
    document.getElementById("modal").style.display="flex";
    clear();
    loadBuses();
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* CLEAR FORM */
function clear(){
    document.getElementById("id").value="";
    document.getElementById("name").value="";
    document.getElementById("email").value="";
    document.getElementById("password").value="";
    document.getElementById("contact").value="";
    document.getElementById("bus_id").value="";
    document.getElementById("route_show").innerText="";
}

/* LOAD BUSES */
async function loadBuses(){
    const res = await fetch(`${API}/get_buses`);
    const data = await res.json();

    let html = `<option value="">Select Bus</option>`;

    data.forEach(b=>{
        const routeText = b.start_point && b.end_point
            ? `${b.start_point} - ${b.end_point}`
            : b.route_id || "";

        html += `
            <option value="${b.id}" data-route="${routeText}">
                Bus ${b.bus_number}
            </option>`;
    });

    const busSelect = document.getElementById("bus_id");
    busSelect.innerHTML = html;

    busSelect.onchange = function(){
        let selected = this.options[this.selectedIndex];
        let route = selected.getAttribute("data-route");

        document.getElementById("route_show").innerText =
            route ? "Route: " + route : "";
    };
}

/* LOAD DRIVERS */
async function load(){

const res = await fetch(`${API}/get_drivers`);
const data = await res.json();

console.log("DRIVERS:", data);

let rows="";

data.forEach(d=>{
rows+=`
<tr>
<td>${d.name}</td>
<td>${d.email}</td>
<td>${d.bus_number || "Not Assigned"}</td>
<td>${d.route_name || d.route_id || "Not Assigned"}</td>
<td>
<button class="icon-btn edit" title="View Details" onclick="viewDriver(${d.id})">
<i class="fa fa-eye"></i>
</button>
</td>
</tr>`;
});

document.getElementById("table").innerHTML = rows;
}

/* VIEW DRIVER */
async function viewDriver(id){
    const res = await fetch(`${API}/get_drivers`);
    const data = await res.json();
    const driver = data.find(d => d.id == id);
    if(!driver) return;

    document.getElementById('modalBody').innerHTML = `
        <div class="profile-info">
            <p><strong>Name:</strong> ${driver.name || "-"}</p>
            <p><strong>Email:</strong> ${driver.email || "-"}</p>
            <p><strong>Contact:</strong> ${driver.contact || "-"}</p>
            <p><strong>Bus Number:</strong> ${driver.bus_number || "Not Assigned"}</p>
            <p><strong>Route:</strong> ${driver.route_name || driver.route_id || "Not Assigned"}</p>
        </div>
    `;
    const editBtn = document.getElementById('editProfileBtn');
    const deleteBtn = document.getElementById('deleteProfileBtn');
    editBtn.onclick = () => {
        closeDetailModal();
        edit(driver);
    };
    deleteBtn.onclick = () => {
        if(confirm('Delete this driver record?')){
            del(id);
            closeDetailModal();
        }
    };
    document.getElementById('detailModal').style.display = 'flex';
}

function closeDetailModal(){
    document.getElementById('detailModal').style.display = 'none';
}

/* EDIT */
async function edit(d){
    document.getElementById("modalTitle").innerText = "Edit Driver";
    document.getElementById("id").value = d.id;
    document.getElementById("name").value = d.name;
    document.getElementById("email").value = d.email;
    document.getElementById("contact").value = d.contact;

    await loadBuses();

    document.getElementById("bus_id").value = d.bus_id || "";
    document.getElementById("bus_id").dispatchEvent(new Event("change"));
    document.getElementById("modal").style.display="flex";
}

/* DELETE */
async function del(id){

if(!confirm("Delete driver?")) return;

await fetch(`${API}/delete_driver/${id}`,{
method:"DELETE"
});

load();
}

/* SAVE DRIVER */
async function save(){

let id = document.getElementById("id").value;

let busIdValue = document.getElementById("bus_id").value;

let data = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
password: document.getElementById("password").value,
contact: document.getElementById("contact").value,
bus_id: busIdValue ? parseInt(busIdValue) : null
};

// Validation: Check if bus is already assigned to another driver
if(busIdValue){
    const driversRes = await fetch(`${API}/get_drivers`);
    const drivers = await driversRes.json();
    const conflictingDriver = drivers.find(d => d.bus_id == busIdValue && d.id != id);
    if(conflictingDriver){
        alert("This bus is already assigned to another driver.");
        return;
    }
}

let url = `${API}/add_driver`;
let method = "POST";

if(id){
url = `${API}/update_driver/${id}`;
method = "PUT";
delete data.password;
}

await fetch(url,{
method,
headers:{ "Content-Type":"application/json" },
body: JSON.stringify(data)
});

closeModal();

/* IMPORTANT FIX */
setTimeout(()=>load(),300);
}

document.addEventListener("DOMContentLoaded", function(){
    document.getElementById("modal").style.display = "none";
    document.getElementById("detailModal").style.display = "none";
    load();
});

</script>

</body>
</html>
