<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drivers Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#dbeafe,#eef2ff 40%),
    radial-gradient(circle at bottom right,#bfdbfe,#eef2ff 45%);
    min-height:100vh;
    overflow-x:hidden;
}

/* SIDEBAR */

#sidebar{
    position:fixed;
    left:0;
    top:0;
    bottom:0;
    width:240px;
    z-index:100;
}

/* MAIN */

.main{
    margin-left:240px;
    width:calc(100% - 240px);
    padding:35px 30px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    gap:24px;
    align-items:center;
}

/* TITLE */

h1{
    color:#1e3a8a;
    margin-bottom:10px;
    font-size:34px;
    font-weight:700;
}

/* BOX */

.box{
    background:white;
    padding:24px;
    border-radius:20px;
    box-shadow:0 18px 40px rgba(15,23,42,0.08);
    width:100%;
    max-width:950px;
    overflow-x:auto;
}

/* ADD BUTTON */

.add-btn{
    padding:12px 18px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    border:none;
    color:white;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:20px;
    font-weight:600;
    font-size:14px;
    transition:0.3s;
    box-shadow:0 10px 24px rgba(37,99,235,0.18);
}

.add-btn:hover{
    transform:translateY(-2px);
    background:linear-gradient(135deg,#1d4ed8,#1e40af);
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    min-width:850px;
}

/* TABLE HEAD */

th{
    background:#2563eb;
    color:white;
    padding:14px;
    text-align:left;
    font-size:14px;
    font-weight:600;
}

/* TABLE DATA */

td{
    padding:14px;
    border-bottom:1px solid #edf2f7;
    color:#334155;
    font-size:14px;
}

/* ROW HOVER */

tr{
    transition:0.2s;
}

tr:hover{
    background:#f8fbff;
}

/* ACTION BUTTONS */

.icon-btn{
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-right:6px;
    color:white;
    font-size:12px;
    width:32px;
    height:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.3s;
}

.icon-btn:hover{
    transform:scale(1.08);
}

.edit{
    background:#f59e0b;
}

.delete{
    background:#ef4444;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(15,23,42,0.55);
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:999;
}

/* MODAL BOX */

.modal-content{
    background:white;
    width:100%;
    max-width:320px;
    padding:18px;
    border-radius:20px;
    box-shadow:0 24px 60px rgba(15,23,42,0.18);
    position:relative;
    animation:popup 0.3s ease;
}

/* POPUP ANIMATION */

@keyframes popup{

    from{
        opacity:0;
        transform:scale(0.9);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

/* FORM TOP */

.form-top{
    text-align:center;
    margin-bottom:14px;
}

/* ICON */

.form-icon{
    width:46px;
    height:46px;
    border-radius:14px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    color:white;
    font-size:18px;
    margin-bottom:10px;
}

/* FORM TITLE */

.form-top h1{
    color:#1e3a8a;
    font-size:18px;
    margin-bottom:3px;
    font-weight:700;
}

/* FORM TEXT */

.form-top p{
    color:#64748b;
    font-size:11px;
}

/* INPUTS */

.modal-content input,
.modal-content select{
    width:100%;
    padding:10px 12px;
    margin:8px 0;
    border:1.5px solid #dbe3f0;
    border-radius:10px;
    background:#f8fafc;
    color:#0f172a;
    font-size:12px;
    outline:none;
    transition:0.3s;
}

/* INPUT FOCUS */

.modal-content input:focus,
.modal-content select:focus{
    background:white;
    border-color:#3b82f6;
    box-shadow:0 0 0 4px rgba(59,130,246,0.10);
}

/* BUTTONS */

.modal-content button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    margin-top:8px;
    transition:0.3s;
}

.modal-content button:hover{
    transform:translateY(-2px);
}

.modal-content button:last-of-type{
    background:#64748b;
}

/* ROUTE TEXT */

#route_show{
    font-size:12px;
    color:#2563eb;
    margin-top:6px;
    font-weight:600;
}
/* YE CSS ADD KARO */

td:last-child{
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
}

/* OPTIONAL - buttons aur clean lagen gy */

.icon-btn{
    flex-shrink:0;
}
/* MOBILE */

@media(max-width:768px){

    #sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
        width:100%;
        padding:20px;
    }

    h1{
        font-size:28px;
    }

    .box{
        padding:18px;
    }
}

</style>
</head>

<body>

<div id="sidebar"></div>

<div class="main">

<h1>Drivers Management</h1>

<div class="box">

<button class="add-btn" onclick="openModal()">
<i class="fa fa-plus"></i> Add Driver
</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Contact</th>
<th>Bus Number</th>
<th>Route</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<div class="form-top">
    <div class="form-icon">
        <i class="fa-solid fa-user-plus"></i>
    </div>
    <h1 id="modalTitle">Add Driver</h1>
    <p>Enter driver details</p>
</div>

<input type="hidden" id="id">
<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="text" id="contact" placeholder="Contact" pattern="[0-9]{11}" minlength="11" maxlength="11" inputmode="numeric">
<select id="bus_id"></select>
<p id="route_show"></p>
<button type="button" onclick="save()">Save</button>
<button type="button" onclick="closeModal()">Close</button>

</div>
</div>

<script>

const API = "https://acceptable-solace-production-06f3.up.railway.app";

/* SIDEBAR */
fetch("sidebar.html")
.then(r=>r.text())
.then(d=>{
    document.getElementById("sidebar").innerHTML=d;
});

/* OPEN MODAL */
function openModal(){
    document.getElementById("modalTitle").innerText = "Add Driver";
    document.getElementById("modal").style.display="flex";
    clear();
    loadBuses();
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* CLEAR FORM */
function clear(){
    document.getElementById("id").value="";
    document.getElementById("name").value="";
    document.getElementById("email").value="";
    document.getElementById("password").value="";
    document.getElementById("contact").value="";
    document.getElementById("bus_id").value="";
    document.getElementById("route_show").innerText="";
}

/* LOAD BUSES */
async function loadBuses(){
    const res = await fetch(`${API}/get_buses`);
    const data = await res.json();

    let html = `<option value="">Select Bus</option>`;

    data.forEach(b=>{
        const routeText = b.start_point && b.end_point
            ? `${b.start_point} - ${b.end_point}`
            : b.route_id || "";

        html += `
            <option value="${b.id}" data-route="${routeText}">
                Bus ${b.bus_number}
            </option>`;
    });

    const busSelect = document.getElementById("bus_id");
    busSelect.innerHTML = html;

    busSelect.onchange = function(){
        let selected = this.options[this.selectedIndex];
        let route = selected.getAttribute("data-route");

        document.getElementById("route_show").innerText =
            route ? "Route: " + route : "";
    };
}

/* LOAD DRIVERS */
async function load(){

const res = await fetch(`${API}/get_drivers`);
const data = await res.json();

console.log("DRIVERS:", data);

let rows="";

data.forEach(d=>{
rows+=`
<tr>
<td>${d.id}</td>
<td>${d.name}</td>
<td>${d.email}</td>
<td>${d.contact}</td>
<td>${d.bus_number || "Not Assigned"}</td>
<td>${d.route_name || d.route_id || "Not Assigned"}</td>
<td>
<button class="icon-btn edit" onclick='edit(${JSON.stringify(d)})'>
<i class="fa fa-pen"></i>
</button>

<button class="icon-btn delete" onclick='del(${d.id})'>
<i class="fa fa-trash"></i>
</button>
</td>
</tr>`;
});

document.getElementById("table").innerHTML = rows;
}

/* EDIT */
async function edit(d){
    document.getElementById("modalTitle").innerText = "Edit Driver";
    document.getElementById("id").value = d.id;
    document.getElementById("name").value = d.name;
    document.getElementById("email").value = d.email;
    document.getElementById("contact").value = d.contact;

    await loadBuses();

    document.getElementById("bus_id").value = d.bus_id || "";
    document.getElementById("bus_id").dispatchEvent(new Event("change"));
    document.getElementById("modal").style.display="flex";
}

/* DELETE */
async function del(id){

if(!confirm("Delete driver?")) return;

await fetch(`${API}/delete_driver/${id}`,{
method:"DELETE"
});

load();
}

/* SAVE DRIVER */
async function save(){

let id = document.getElementById("id").value;

let busIdValue = document.getElementById("bus_id").value;

let data = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
password: document.getElementById("password").value,
contact: document.getElementById("contact").value,
bus_id: busIdValue ? parseInt(busIdValue) : null
};

// Validation: Check if bus is already assigned to another driver
if(busIdValue){
    const driversRes = await fetch(`${API}/get_drivers`);
    const drivers = await driversRes.json();
    const conflictingDriver = drivers.find(d => d.bus_id == busIdValue && d.id != id);
    if(conflictingDriver){
        alert("This bus is already assigned to another driver.");
        return;
    }
}

let url = `${API}/add_driver`;
let method = "POST";

if(id){
url = `${API}/update_driver/${id}`;
method = "PUT";
delete data.password;
}

await fetch(url,{
method,
headers:{ "Content-Type":"application/json" },
body: JSON.stringify(data)
});

closeModal();

/* IMPORTANT FIX */
setTimeout(()=>load(),300);
}

document.addEventListener("DOMContentLoaded", function(){
    document.getElementById("modal").style.display = "none";
    load();
});

</script>

</body>
</html>
