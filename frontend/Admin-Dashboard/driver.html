<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drivers Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#f4f6fb;
}

/* MAIN */
.main{
margin-left:240px;
width:100%;
padding:30px;
}

h1{
color:#1e3a8a;
margin-bottom:20px;
}

/* BOX */
.box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* BUTTON */
.add-btn{
padding:8px 14px;
background:#10b981;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:15px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#3b82f6;
color:white;
padding:10px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f1f5ff;
}

/* ICON BUTTONS */
.icon-btn{
border:none;
padding:6px;
border-radius:6px;
cursor:pointer;
margin-right:5px;
color:white;
}

.edit{background:#f59e0b;}
.delete{background:#ef4444;}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;
width:320px;
margin:10% auto;
padding:20px;
border-radius:10px;
}

.modal-content input{
width:100%;
padding:8px;
margin:8px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN -->
<div class="main">

<h1>Drivers Management</h1>

<div class="box">

<button class="add-btn" onclick="openModal()">
<i class="fa fa-plus"></i> Add Driver
</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Contact</th>
<th>Route</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<input type="hidden" id="id">

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="text" id="contact" placeholder="Contact">
<input type="text" id="route_number" placeholder="Route">

<button onclick="save()">Save</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

/* SIDEBAR LOAD (same as your real file) */
fetch("sidebar.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("sidebar").innerHTML=d;
});

/* OPEN / CLOSE */
function openModal(){
document.getElementById("modal").style.display="block";
clear();
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* LOAD DRIVERS */
function load(){

fetch("http://127.0.0.1:5000/get_drivers")
.then(r=>r.json())
.then(data=>{

let rows="";

data.forEach(d=>{

rows+=`
<tr>
<td>${d.id}</td>
<td>${d.name}</td>
<td>${d.email}</td>
<td>${d.contact}</td>
<td>${d.route_number}</td>

<td>
<button class="icon-btn edit" onclick='edit(${JSON.stringify(d)})'>
<i class="fa fa-pen"></i>
</button>

<button class="icon-btn delete" onclick='del(${d.id})'>
<i class="fa fa-trash"></i>
</button>
</td>

</tr>
`;

});

document.getElementById("table").innerHTML=rows;

});

}

/* SAVE (ADD + UPDATE) */
function save(){

let id=document.getElementById("id").value;

let data={
name:document.getElementById("name").value.trim(),
email:document.getElementById("email").value.trim(),
password:document.getElementById("password").value.trim(),
contact:document.getElementById("contact").value.trim(),
route_number:document.getElementById("route_number").value.trim()
};

if(!data.name || !data.email || !data.password){
alert("Name, Email, Password required");
return;
}

let url="http://127.0.0.1:5000/add_driver";
let method="POST";

if(id){
url=`http://127.0.0.1:5000/update_driver/${id}`;
method="PUT";
}

fetch(url,{
method:method,
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(res=>{
alert(res.message);
closeModal();
load();
});

}

/* EDIT */
function edit(d){

document.getElementById("id").value=d.id;
document.getElementById("name").value=d.name;
document.getElementById("email").value=d.email;
document.getElementById("contact").value=d.contact;
document.getElementById("route_number").value=d.route_number;

document.getElementById("modal").style.display="block";
}

/* DELETE */
function del(id){

fetch(`http://127.0.0.1:5000/delete_driver/${id}`,{
method:"DELETE"
})
.then(r=>r.json())
.then(res=>{
alert(res.message);
load();
});

}

/* CLEAR */
function clear(){
document.getElementById("id").value="";
document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("password").value="";
document.getElementById("contact").value="";
document.getElementById("route_number").value="";
}

load();

</script>

</body>
</html>
