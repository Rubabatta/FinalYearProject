<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drivers Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}

.main{margin-left:240px;width:100%;padding:30px;}

h1{color:#1e3a8a;margin-bottom:20px;}

.box{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.add-btn{
padding:8px 14px;
background:#10b981;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-bottom:15px;
}

table{width:100%;border-collapse:collapse;}
th{background:#3b82f6;color:white;padding:10px;text-align:left;}
td{padding:10px;border-bottom:1px solid #eee;}
tr:hover{background:#f1f5ff;}

.icon-btn{border:none;padding:6px;border-radius:6px;cursor:pointer;margin-right:5px;color:white;}
.edit{background:#f59e0b;}
.delete{background:#ef4444;}

.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
}

.modal-content{
background:white;width:350px;margin:10% auto;padding:20px;border-radius:10px;
}

.modal-content input,
.modal-content select{
width:100%;padding:8px;margin:8px 0;
}

#route_show{font-size:13px;color:#1e3a8a;margin-top:5px;}
</style>
</head>

<body>

<div id="sidebar"></div>

<div class="main">

<h1>Drivers Management</h1>

<div class="box">

<button class="add-btn" onclick="openModal()">
<i class="fa fa-plus"></i> Add Driver
</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Contact</th>
<th>Route</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<input type="hidden" id="id">

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="text" id="contact" placeholder="Contact">

<select id="bus_id"></select>

<p id="route_show"></p>

<button onclick="save()">Save</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const API = "https://acceptable-solace-production-06f3.up.railway.app";

let buses = [];
let selectedRoute = null;

/* SIDEBAR */
fetch("sidebar.html")
.then(r=>r.text())
.then(d=>{
document.getElementById("sidebar").innerHTML=d;
});

/* OPEN */
function openModal(){
document.getElementById("modal").style.display="block";
clear();
loadBuses();
}

/* CLOSE */
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* CLEAR */
function clear(){
document.getElementById("id").value="";
document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("password").value="";
document.getElementById("contact").value="";
document.getElementById("bus_id").value="";
document.getElementById("route_show").innerText="";
selectedRoute=null;
}

/* LOAD BUSES */
async function loadBuses(){
const res = await fetch(`${API}/get_buses`);
const data = await res.json();

buses = data;

let html = `<option value="">Select Bus</option>`;
data.forEach(b=>{
html += `<option value="${b.id}">Bus ${b.bus_number}</option>`;
});

document.getElementById("bus_id").innerHTML = html;
}

/* BUS CHANGE */
document.addEventListener("change", (e)=>{
if(e.target.id === "bus_id"){
const bus = buses.find(b=>b.id == e.target.value);

if(bus){
selectedRoute = bus.route_id;
document.getElementById("route_show").innerText = "Route: " + bus.route_id;
}else{
selectedRoute = null;
document.getElementById("route_show").innerText = "";
}
}
});

/* LOAD DRIVERS */
async function load(){
const res = await fetch(`${API}/get_drivers`);
const data = await res.json();

let rows="";

data.forEach(d=>{
rows+=`
<tr>
<td>${d.id}</td>
<td>${d.name}</td>
<td>${d.email}</td>
<td>${d.contact}</td>
<td>${d.route_number || "Not Assigned"}</td>
<td>
<button class="icon-btn edit" onclick='edit(${JSON.stringify(d)})'>
<i class="fa fa-pen"></i>
</button>

<button class="icon-btn delete" onclick='del(${d.id})'>
<i class="fa fa-trash"></i>
</button>
</td>
</tr>`;
});

document.getElementById("table").innerHTML = rows;
}

/* SAVE DRIVER */
async function save(){

let id = document.getElementById("id").value;

let busIdValue = document.getElementById("bus_id").value;

// ✅ FIX: empty bus_id handle
if(busIdValue === "") busIdValue = null;

let data = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
password: document.getElementById("password").value,
contact: document.getElementById("contact").value,
route_number: selectedRoute
};

let url = `${API}/add_driver`;
let method = "POST";

if(id){
url = `${API}/update_driver/${id}`;
method = "PUT";

// update me password include nahi ho raha tha → backend mismatch fix
delete data.password;
}

const res = await fetch(url,{
method,
headers:{ "Content-Type":"application/json" },
body: JSON.stringify(data)
});

const result = await res.json();

if(!res.ok){
alert(result.message || "Error");
return;
}

alert(result.message);
closeModal();
load();
}

</script>

</body>
</html>
