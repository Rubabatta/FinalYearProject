<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Bus</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* Main content styles */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}
.main{margin-left:240px;padding:40px;width:100%;}
.topbar h1{color:#1e3a8a;margin-bottom:20px;}
.form-box{background:white;padding:30px;border-radius:10px;width:400px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.form-box label{display:block;margin-top:15px;}
.form-box input,
.form-box select{width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:6px;}
button{margin-top:20px;padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;}
button:hover{background:#1e40af;}
</style>
</head>

<body>

<!-- Sidebar placeholder -->
<div id="sidebar-placeholder"></div>

<!-- Main content -->
<div class="main">
<div class="topbar">
<h1>Add New Bus</h1>
</div>

<div class="form-box">
<label>Bus Number</label>
<input type="text" id="busNumber" placeholder="Enter Bus Number">

<label>Route</label>
<select id="routeSelect">
<option value="">Select Route</option>
<option value="1">Route 1</option>
<option value="2">Route 2</option>
<option value="3">Route 3</option>
</select>

<label>Status</label>
<select id="statusSelect">
<option value="Assigned">Assigned</option>
<option value="Unassigned">Unassigned</option>
</select>

<button onclick="addBus()">Add Bus</button>
</div>
</div>

<script>
// Load sidebar dynamically
fetch('sidebar.html')
.then(res => res.text())
.then(html => {
    document.getElementById('sidebar-placeholder').innerHTML = html;
});

// Logout function (from sidebar)
function logout(){
    localStorage.removeItem("adminName");
    window.location.href="admin-login.html";
}

// Add Bus function
function addBus(){
    const bus_number=document.getElementById("busNumber").value.trim();
    const route_id=document.getElementById("routeSelect").value;
    const status=document.getElementById("statusSelect").value;

    if(bus_number==="" || route_id===""){
        alert("Please fill all fields");
        return;
    }

    fetch("http://127.0.0.1:5000/add_bus",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({bus_number, route_id, status})
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        document.getElementById("busNumber").value="";
        document.getElementById("routeSelect").value="";
        document.getElementById("statusSelect").value="Assigned";
    })
    .catch(err=>{
        console.error("Error:",err);
        alert("Server error, check console");
    });
}
</script>

</body>
</html>
