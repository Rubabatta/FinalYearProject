<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Stops</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}
.main{margin-left:240px;width:100%;padding:30px;}
h1{color:#1e3a8a;margin-bottom:20px;}
.form-box{background:white;padding:30px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);max-width:600px;}
label{display:block;margin-top:15px;font-weight:500;}
select,input{width:100%;padding:10px;margin-top:6px;border:1px solid #ccc;border-radius:6px;}
button{margin-top:20px;padding:10px 20px;border:none;border-radius:6px;background:#3b82f6;color:white;cursor:pointer;}
button:hover{background:#1e40af;}
.stop-list{margin-top:15px;}
.table-box{background:white;padding:20px;border-radius:10px;margin-top:20px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.table-box table{width:100%;border-collapse:collapse;}
.table-box th{background:#3b82f6;color:white;padding:10px;text-align:left;}
.table-box td{padding:10px;border-bottom:1px solid #eee;}
.delete-btn{background:#ef4444;color:white;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;}
.delete-btn:hover{background:#dc2626;}
</style>
</head>
<body>

<div id="sidebar-placeholder"></div>

<div class="main">
<h1>Add / Manage Stops</h1>

<div class="form-box">
<label>Select Route</label>
<select id="routeSelect"></select>

<div class="stop-list">
<label>Stop 1</label>
<input type="text" class="stop">
<label>Stop 2</label>
<input type="text" class="stop">
<label>Stop 3</label>
<input type="text" class="stop">
<label>Stop 4</label>
<input type="text" class="stop">
<label>Stop 5</label>
<input type="text" class="stop">
</div>

<button onclick="addStops()">Add Stops</button>
</div>

<div class="table-box">
<h3>Current Stops</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Stop Name</th>
<th>Action</th>
</tr>
</thead>
<tbody id="stopsTable"></tbody>
</table>
</div>

</div>

<script>
// Load sidebar
fetch("sidebar.html")
.then(res=>res.text())
.then(data=>{
  document.getElementById("sidebar-placeholder").innerHTML=data;
});

// Load routes
function loadRoutes(){
  fetch("http://127.0.0.1:5000/get_routes")
  .then(res=>res.json())
  .then(data=>{
    let options = '<option value="">-- Select Route --</option>';
    data.forEach(route=>{
      options += `<option value="${route.id}">${route.start_point} → ${route.end_point}</option>`;
    });
    document.getElementById("routeSelect").innerHTML = options;
  });
}
loadRoutes();

// Load stops for selected route
document.getElementById("routeSelect").addEventListener("change", loadStops);

function loadStops(){
  const routeId = document.getElementById("routeSelect").value;
  if(!routeId) return;

  fetch(`http://127.0.0.1:5000/get_stops/${routeId}`)
  .then(res=>res.json())
  .then(data=>{
    let rows = '';
    data.forEach(stop=>{
      rows += `<tr>
        <td>${stop.id}</td>
        <td>${stop.stop_name}</td>
        <td><button class="delete-btn" onclick="deleteStop(${stop.id})">Delete</button></td>
      </tr>`;
    });
    document.getElementById("stopsTable").innerHTML = rows;
  });
}

// Add stops
function addStops(){
  const routeId = document.getElementById("routeSelect").value;
  if(!routeId){
    alert("Select a route first!");
    return;
  }

  const stops = document.querySelectorAll(".stop");
  stops.forEach(stop=>{
    if(stop.value.trim() != ""){
      fetch("http://127.0.0.1:5000/add_stop",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({route_id:routeId, stop_name:stop.value.trim()})
      })
      .then(res=>res.json())
      .then(data=>{
        console.log(data.message);
        stop.value = "";
      });
    }
  });

  setTimeout(()=>{ loadStops(); }, 500); // reload table after adding
}

// Delete stop
function deleteStop(id){
  fetch(`http://127.0.0.1:5000/delete_stop/${id}`, {method:"DELETE"})
  .then(res=>res.json())
  .then(data=>{
    alert(data.message);
    loadStops();
  });
}
</script>
</body>
</html>
