<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Login | Uni Shuttle</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background: url("images/uni-bus2.jpeg") no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MENU ICON */
.menu-icon{
    position:absolute;
    top:30px;
    right:30px;
    font-size:28px;
    color:white;
    cursor:pointer;
}

/* MAIN CONTAINER */
.container{
    text-align:center;
    padding:20px;
    background: rgba(255,255,255,0.15); /* very light transparency */
    backdrop-filter: blur(2px); /* subtle blur */
    border-radius:20px;
}

/* PAGE TITLE */
.container h1{
    color:white;
    margin-bottom:50px;
    font-size:32px;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
}

/* LOGIN CARDS */
.cards{
    display:flex;
    gap:40px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background: rgba(255,255,255,0.25); /* light transparent */
    backdrop-filter: blur(1px); /* subtle */
    padding:40px 30px;
    width:250px;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    border:1px solid rgba(255,255,255,0.2);
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.card i{
    font-size:50px;
    color:#3b82f6;
    margin-bottom:20px;
}

.card h3{
    margin-bottom:12px;
    color:white;
    font-size:22px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

.card p{
    font-size:15px;
    color:white;
    line-height:1.5;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
}

/* MOBILE */
@media(max-width:700px){
    .cards{
        flex-direction:column;
        align-items:center;
    }
    .card{
        width:80%;
    }
}
</style>
</head>
<body>

<!-- MENU ICON -->
<div class="menu-icon" onclick="goHome()">
    <i class="fa fa-bars"></i>
</div>

<div class="container">
    <h1>Select Login Type</h1>
    <div class="cards">
        <!-- STUDENT -->
        <div class="card" onclick="goStudent()">
            <i class="fa fa-user-graduate"></i>
            <h3>Student Login</h3>
            <p>Login to track shuttle and view routes</p>
        </div>
        <!-- ADMIN -->
        <div class="card" onclick="goAdmin()">
            <i class="fa fa-user-shield"></i>
            <h3>Admin Login</h3>
            <p>Manage buses, routes and GPS tracking</p>
        </div>
    </div>
</div>

<script>
function goStudent(){
    window.location.href="student-login.html";
}
function goAdmin(){
    window.location.href="admin-login.html";
}
function goHome(){
    window.location.href="index.html";
}
</script>

</body>
</html>
