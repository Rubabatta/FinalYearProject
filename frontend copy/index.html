<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard | Uni Shuttle</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;}

/* SIDEBAR */
.sidebar{
    width:220px;height:100vh;background:#1e3a8a;color:white;padding:20px;position:fixed;
}
.sidebar h2{text-align:center;margin-bottom:30px;}
.sidebar ul{list-style:none;}
.sidebar ul li{
    padding:12px;margin:8px 0;border-radius:6px;cursor:pointer;transition:0.3s;
}
.sidebar ul li i{margin-right:10px;}
.sidebar ul li:hover{background:#3b82f6;}

/* MAIN AREA */
.main{margin-left:220px;width:100%;padding:25px;}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
.topbar h1{color:#1e3a8a;}
.profile{background:white;padding:8px 15px;border-radius:30px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:25px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);display:flex;justify-content:space-between;align-items:center;}
.card i{font-size:28px;color:#3b82f6;}
.card h3{font-size:15px;color:#555;}
.card p{font-size:22px;font-weight:600;color:#1e3a8a;}

/* MAP AREA */
.map-area{display:flex;gap:20px;flex-wrap:wrap;}
#map{flex:2;height:400px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);}
.vehicle-panel{flex:1;background:white;padding:20px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);max-height:400px;overflow-y:auto;}
.vehicle-panel h4{margin-bottom:15px;}
.vehicle-panel .vehicle{padding:10px;margin-bottom:10px;border-bottom:1px solid #eee;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-top:25px;}
.stats .card{flex-direction:column;align-items:flex-start;padding:15px;}

/* BOTTOM SECTION */
.bottom{display:flex;gap:20px;margin-top:25px;flex-wrap:wrap;}
.bottom-card{flex:1;background:white;padding:20px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.08);}
.bottom-card h4{margin-bottom:10px;}
.bottom-card ul{list-style:disc;margin-left:20px;}

@media(max-width:900px){
    .map-area{flex-direction:column;}
    #map{height:300px;}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Student Panel</h2>
<ul>
<li><i class="fa fa-bus"></i> Active Buses</li>
<li><i class="fa fa-route"></i> Routes</li>
<li><i class="fa fa-clock"></i> Shuttle Updates</li>
</ul>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h1>Welcome, <span id="studentNameDisplay">Student</span></h1>
<div class="profile">
<i class="fa fa-user"></i>
</div>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">
<div><h3>Active Buses</h3><p id="activeBuses">0</p></div>
<i class="fa fa-bus"></i>
</div>
<div class="card">
<div><h3>On Time Arrival</h3><p id="onTimeArrival">0%</p></div>
<i class="fa fa-clock"></i>
</div>
<div class="card">
<div><h3>Students Transported</h3><p id="studentsTransported">0</p></div>
<i class="fa fa-user-graduate"></i>
</div>
<div class="card">
<div><h3>Routes Available</h3><p id="routesAvailable">0</p></div>
<i class="fa fa-route"></i>
</div>
</div>

<!-- MAP AREA -->
<div class="map-area">
<div id="map"></div>
<div class="vehicle-panel">
<h4>Active Shuttle Buses</h4>
<div id="vehicleList"></div>
</div>
</div>

<!-- BOTTOM SECTION -->
<div class="bottom">
<div class="bottom-card">
<h4>Route Information</h4>
<div id="routeInfo"></div>
</div>
<div class="bottom-card">
<h4>Recent Shuttle Updates</h4>
<ul id="shuttleUpdates"></ul>
</div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
<script>
// Set student name from login
const studentNameDisplay = document.getElementById("studentNameDisplay");
const storedName = localStorage.getItem("studentName");
if(storedName) studentNameDisplay.innerText = storedName;

// Initialize map
var map = L.map('map').setView([31.5204, 74.3587], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ attribution:'© OpenStreetMap'}).addTo(map);

// Bus Icon
var busIcon = L.icon({iconUrl:'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',iconSize:[35,35]});

// Fetch shuttle locations
async function fetchShuttleLocation(){
    try {
        const res = await fetch('http://127.0.0.1:5000/get_location');
        const data = await res.json();
        const vehicleList = document.getElementById("vehicleList");
        vehicleList.innerHTML = "";
        const shuttleUpdates = document.getElementById("shuttleUpdates");
        shuttleUpdates.innerHTML = "";

        if(Array.isArray(data)){
            data.forEach(bus=>{
                // Map marker
                L.marker([bus.latitude,bus.longitude],{icon:busIcon}).addTo(map)
                 .bindPopup(`<b>${bus.bus_number}</b><br>Driver: ${bus.driver_name}<br>Route: ${bus.route}<br>Speed: ${bus.speed} km/h`);

                // Vehicle panel
                vehicleList.innerHTML += `<div class="vehicle">
                <b>${bus.bus_number}</b>
                <p>Driver: ${bus.driver_name}</p>
                <p>Route: ${bus.route}</p>
                <p>Speed: ${bus.speed} km/h</p>
                </div>`;

                // Recent updates
                shuttleUpdates.innerHTML += `<li>${bus.bus_number} ${bus.update}</li>`;
            });

            // Stats
            document.getElementById("activeBuses").innerText = data.length;
            document.getElementById("studentsTransported").innerText = data.reduce((a,b)=>a+b.students_onboard,0);
            document.getElementById("routesAvailable").innerText = [...new Set(data.map(b=>b.route))].length;
            document.getElementById("onTimeArrival").innerText = Math.floor(data.filter(b=>b.on_time).length / data.length *100) + "%";
        }

    } catch(err){console.error(err);}
}

// Fetch routes info
async function fetchRoutes(){
    try{
        const res = await fetch('http://127.0.0.1:5000/get_routes');
        const routes = await res.json();
        const routeInfo = document.getElementById("routeInfo");
        routeInfo.innerHTML = "";
        routes.forEach(r=>{routeInfo.innerHTML += `<p>${r.start_point} → ${r.end_point}</p>`;});
    } catch(err){console.error(err);}
}

fetchShuttleLocation();
setInterval(fetchShuttleLocation,5000);
fetchRoutes();
</script>

</body>
</html>
