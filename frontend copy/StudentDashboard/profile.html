<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Shuttle Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6fb;height:100vh;}
.sidebar{width:230px;height:100vh;background:#2563eb;color:white;padding:25px;position:fixed;}
.sidebar h2{text-align:center;margin-bottom:30px;}
.sidebar ul{list-style:none;}
.sidebar ul li{padding:12px;margin:10px 0;border-radius:6px;cursor:pointer;transition:0.3s;}
.sidebar ul li i{margin-right:10px;}
.sidebar ul li:hover{background:#1e40af;}
.main{margin-left:230px;width:100%;padding:20px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.topbar h1{color:#1e3a8a;}
.profile{background:white;padding:8px 15px;border-radius:30px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
.profile-box{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.profile-box p{margin:8px 0;}
</style>
</head>
<body>
<div class="sidebar">
<h2>Student</h2>
<ul>
<li><i class="fa fa-home"></i> Dashboard</li>
<li><i class="fa fa-bus"></i> My Bus</li>
<li><i class="fa fa-route"></i> Route</li>
<li><i class="fa fa-location-dot"></i> Track Bus</li>
<li><i class="fa fa-user"></i> Profile</li>
<li id="logoutBtn"><i class="fa fa-right-from-bracket"></i> Logout</li>
</ul>
</div>

<div class="main">
<div class="topbar">
<h1>Profile</h1>
<div class="profile" id="studentName">Loading...</div>
</div>

<div class="profile-box" id="profileBox">
<p><strong>Name:</strong> Rubab Atta</p>
<p><strong>Email:</strong> rubab@example.com</p>
<p><strong>Center:</strong> Main Campus</p>
<p><strong>Address:</strong> XYZ Street</p>
<p><strong>Fees:</strong> 10000</p>
</div>
</div>

<script>
document.getElementById("studentName").innerText = localStorage.getItem("studentName") || "Student";
document.getElementById("logoutBtn").addEventListener("click",function(){
    localStorage.removeItem("studentName");
    window.location.href="student-login.html";
});
</script>
</body>
</html>
