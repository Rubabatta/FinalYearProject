<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
}

/* MAIN CONTENT */

.main{
margin-left:230px;
padding:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card h3{
color:#2563eb;
margin-bottom:10px;
}

/* MAP */

.map{
height:250px;
background:#dbeafe;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
margin-bottom:30px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

th,td{
padding:12px;
text-align:center;
}

th{
background:#2563eb;
color:white;
}

</style>
</head>

<body>

<!-- Sidebar Load -->
<div id="sidebar"></div>


<div class="main">

<h1>Student Dashboard</h1>

<div class="cards">

<div class="card">
<h3>My Bus</h3>
<p>Bus 02</p>
</div>

<div class="card">
<h3>Route</h3>
<p>City → University</p>
</div>

<div class="card">
<h3>Next Shuttle</h3>
<p>8:30 AM</p>
</div>

<div class="card">
<h3>Driver</h3>
<p>Ali Khan</p>
</div>

</div>

<h2>Track Shuttle</h2>

<div class="map">
Bus Location Map
</div>

<h2>Schedule</h2>

<table>

<tr>
<th>Bus</th>
<th>Route</th>
<th>Departure</th>
<th>Arrival</th>
</tr>

<tr>
<td>Bus 01</td>
<td>City → Uni</td>
<td>8:00 AM</td>
<td>8:45 AM</td>
</tr>

</table>

</div>


<script>

fetch("student-sidebar.html")
.then(res => res.text())
.then(data =>{
document.getElementById("sidebar").innerHTML=data;
})

</script>

</body>
</html>
